=================================================================== */
function viewMeas(){
  const its=items();
  const opts = ['<option value="all">सभी आइटम</option>'].concat(its.map(it=>`<option value="${esc(it.ItemID)}" ${state.measFilter===it.ItemID?'selected':''}>${esc(it.ItemNo)} · ${esc(it.Description)}</option>`)).join('');
  const head=`<div class="section-head"><h2>नाप (Measurement)</h2><span class="sub">हर आइटम: स्वीकृति के अनुसार · भुगतान हो चुका · बचा हुआ</span>
    <div class="spacer"></div></div>`;
  if(!its.length) return head+emptyCard('📏','पहले आइटम जोड़ें','नाप किसी आइटम के अंतर्गत दर्ज होती है — पहले BOQ आइटम बनाएँ।','आइटम पर जाएँ','switchTab(\'items\')');

  const engs=projectEngineers();
  const engOpts='<option value="">— सभी अभियंता —</option>'+engs.map(e=>`<option ${state.measEng===e?'selected':''}>${esc(e)}</option>`).join('');
  const bills=D().payments.slice().sort((a,b)=>String(a.BillNo||'').localeCompare(String(b.BillNo||'')));
  const billOpts='<option value="">— सभी बिल —</option>'+bills.map(p=>`<option value="${esc(p.PayID)}" ${state.measBill===p.PayID?'selected':''}>${esc(p.BillNo||'(बिना नाम)')}</option>`).join('');
  const bOpt=(v,l)=>`<option value="${v}" ${(state.measBlock||'all')===v?'selected':''}>${l}</option>`;
  const toolbar=`<div class="toolbar">
    <div class="field" style="min-width:230px"><label>आइटम अनुसार छाँटें</label>
      <select class="inp" onchange="state.measFilter=this.value; render()">${opts}</select></div>
    <div class="field" style="min-width:210px"><label>अनुभाग (block)</label>
      <select class="inp" onchange="state.measBlock=this.value; render()">${bOpt('all','सभी')}${bOpt('sanc','① निर्धारित नाप')}${bOpt('paid','② भुगतान हो चुका')}${bOpt('rem','③ Record हो गया, भुगतान शेष')}</select></div>
    ${engs.length?`<div class="field" style="min-width:190px"><label>अवर अभियंता</label>
      <select class="inp" onchange="state.measEng=this.value; render()">${engOpts}</select></div>`:''}
    ${bills.length?`<div class="field" style="min-width:170px"><label>भुगतान / बिल संख्या</label>
      <select class="inp" onchange="state.measBill=this.value; render()">${billOpts}</select></div>`:''}
    ${(state.measEng||state.measBill||(state.measBlock&&state.measBlock!=='all'))?`<button class="btn btn-ghost btn-sm" style="align-self:flex-end" onclick="state.measEng='';state.measBill='';state.measBlock='all';render()">फ़िल्टर हटाएँ</button>`:''}</div>`;

  const list = state.measFilter==='all' ? its : its.filter(it=>String(it.ItemID)===String(state.measFilter));
  let blocks = list.map(itemMeasCard).join('');
  if(!blocks.trim()) blocks = emptyCard('📏','कोई परिणाम नहीं','चुने गए फ़िल्टर (आइटम/अभियंता/बिल) पर कोई नाप नहीं — फ़िल्टर बदलें।','फ़िल्टर हटाएँ','state.measEng=\'\';state.measBill=\'\';state.measFilter=\'all\';render()');
  return head+toolbar+blocks;
}

/* ---- नाप-लाइन के साझा सेल (विवरण · चैनेज · पक्ष · नग1 · नग2 · लं · चौ · ऊँ) ---- */
function chRange(m){ const f=String(m.ChFrom||'').trim(), t=String(m.ChTo||'').trim();
  if(!f && !t) return ''; return (f||'?')+' – '+(t||'?'); }
function dimTd(v){ const s=String(v==null?'':v).trim(); return s===''?'<td class="c faint">—</td>':`<td class="c num">${qf(toNum(s))}</td>`; }
function dimTd2(v){ const s=String(v==null?'':v).trim(); return s===''?'<td class="c faint">—</td>':`<td class="c num">${nf2(v)}</td>`; }
function dimTdE(v,expr){ const e=String(expr==null?'':expr).trim();
  if(e!=='') return `<td class="c num" style="font-family:var(--mono)" title="= ${nf2(evalNum(e)||0)}">${esc(e)}</td>`;
  const s=String(v==null?'':v).trim(); return s===''?'<td class="c faint">—</td>':`<td class="c num">${nf2(v)}</td>`; }
function leadCells(m){
  const d=String(m.Description||'').trim(), ch=chRange(m), s=sideLabel(m);
  return `<td>${esc(d)||'<span class="faint">—</span>'}</td>
    <td class="num faint">${esc(ch)||'—'}</td>
    <td class="c">${esc(s)||'<span class="faint">—</span>'}</td>
    ${dimTd(nos1Of(m))}${dimTd(nos2Of(m))}${dimTd2(m.Length)}${dimTdE(m.Breadth,m.BreadthExpr)}${dimTdE(m.Depth,m.DepthExpr)}`;
}
function mbTd(m){ return `<td class="faint">${esc(m.MBNo||'')||'—'}${m.MBPage?(' / पृ.'+esc(m.MBPage)):''}</td>`; }
function recTd(m){ const mb=esc(m.RecordMB||''), dt=m.RecordDate?dmy(m.RecordDate):'';
  return `<td class="faint">${mb||'—'}${dt?(' / '+dt):''}</td>`; }
const LEAD_TH = `<th>विवरण</th><th>चैनेज (से–तक)</th><th class="c">पक्ष</th><th class="c">नग 1</th><th class="c">नग 2</th><th class="c">लंबाई</th><th class="c">चौड़ाई</th><th class="c">ऊँचाई</th>`;
const UNIT_OPTIONS_FALLBACK = ['घन मीटर','वर्ग मीटर','मीटर','संख्या'];
/* सेटिंग में परिभाषित इकाइयाँ — हर इकाई के साथ कौन-कौन सेल (नग1/नग2/लं/चौ/ऊँ) सक्रिय होंगे, यह भी सेव होता है */
function unitConfigs(){
  const list=state.data.unitConfigs;
  return (Array.isArray(list)&&list.length) ? list : UNIT_OPTIONS_FALLBACK.map(n=>({name:n,nos1:true,nos2:true,length:true,breadth:true,depth:true}));
}
function unitOptionsHtml(cur){
  cur=String(cur||'').trim();
  const list=unitConfigs().map(u=>u.name);
  if(cur && list.indexOf(cur)===-1) list.unshift(cur);   // मौजूदा/आयातित गैर-मानक इकाई सुरक्षित रखें
  return (cur?'':'<option value="">— इकाई चुनें —</option>')+list.map(u=>`<option ${u===cur?'selected':''}>${esc(u)}</option>`).join('');
}
/* ---- अवर अभियंता (प्रोजेक्ट-स्तरीय सूची) ---- */
function projectEngineers(){
  const raw=String((state.data.project&&state.data.project.engineers)||'').trim();
  return raw? raw.split(/[\n,;]+/).map(s=>s.trim()).filter(Boolean) : [];
}
function engineerOptionsHtml(cur){
  cur=String(cur||'').trim();
  const list=projectEngineers().slice();
  if(cur && list.indexOf(cur)===-1) list.unshift(cur);
  return '<option value="">— अभियंता —</option>'+list.map(e=>`<option ${e===cur?'selected':''}>${esc(e)}</option>`).join('');
}
/* किसी नाप का अभियंता — निर्धारित का अपना; वास्तविक का = उसके parent निर्धारित का */
function measEngineer(m){
  if(!m) return '';
  if(isSanc(m)) return String(m.Engineer||'').trim();
  const s=sancById(m.SancRef); return s? String(s.Engineer||'').trim() : '';
}
/* इकाई के अनुसार कौन-कौन से सेल (नग1/नग2/लं/चौ/ऊँ) लगेंगे — सेटिंग में परिभाषित इकाई-config से;
   अगर कोई मेल न खाए (पुरानी/आयातित गैर-मानक इकाई) तो पुराने regex अनुमान पर वापस जाएँ */
function itemDims(it){
  const uName=String(it&&it.Unit||'').trim();
  const cfg=unitConfigs().find(c=>c.name===uName || c.name.toLowerCase()===uName.toLowerCase());
  if(cfg) return {N1:cfg.nos1!==false, N2:cfg.nos2!==false, L:!!cfg.length, B:!!cfg.breadth, D:!!cfg.depth};
  const u=uName.toLowerCase();
  if(/घन|cum|cu\.?m|m3|m³|cubic/.test(u))                       return {N1:true,N2:true,L:true,  B:true,  D:true};   // आयतन
  if(/वर्ग|sq|sqm|sq\.?m|m2|m²|square/.test(u))                  return {N1:true,N2:true,L:true,  B:true,  D:false};  // क्षेत्रफल
  if(/संख्या|नग|each|number|count|\bno\.?\b|\bnos\b/.test(u))     return {N1:true,N2:true,L:false, B:false, D:false};  // संख्या — केवल नग
  if(/रनिंग|running|र\.?मी|\brm\b|\brmt\b|मीटर|metre|meter/.test(u)) return {N1:true,N2:true,L:true,  B:false, D:false};  // लंबाई/रनिंग
  return {N1:true,N2:true,L:true, B:true, D:true};                                                                  // डिफ़ॉल्ट
}

function blockTable(title, sub, theadExtra, rows, emptyColspan, addBtn, tbodyId){
  const bId = tbodyId ? ` id="${tbodyId}"` : '';
  return `<div class="section-head" style="margin:6px 2px 8px"><h2 style="font-size:15px">${title}</h2>
      <span class="sub">${sub}</span><div class="spacer"></div>${addBtn||''}</div>
    <div class="card tbl-wrap" style="margin-bottom:14px"><table class="sep meas-tbl">
    <thead><tr>${LEAD_TH}${theadExtra}</tr></thead>
    <tbody${bId}>${rows||`<tr><td colspan="${emptyColspan}" class="muted" style="text-align:center;padding:14px">—</td></tr>`}</tbody>
    </table></div>`;
}
function filterSancRows(tbodyId, itemId){
  const tbody=document.getElementById(tbodyId);
  const input=document.getElementById(tbodyId+'-q');
  if(!tbody) return;
  const term=(input?input.value:'').trim().toLowerCase();
  if(itemId!=null){
    if(!state.sancSearch) state.sancSearch={};
    state.sancSearch[String(itemId)]=term;
  }
  tbody.querySelectorAll('tr').forEach(function(tr){
    tr.style.display=(!term||(tr.getAttribute('data-search')||'').indexOf(term)!==-1)?'':'none';
  });
}
function clearSancFilter(tbodyId, itemId){
  const input=document.getElementById(tbodyId+'-q');
  if(input) input.value='';
  if(itemId!=null && state.sancSearch) delete state.sancSearch[String(itemId)];
  filterSancRows(tbodyId, itemId);
}

function itemMeasCard(it){
  const unit=esc(it.Unit||''), iid=JSON.stringify(it.ItemID);
  const fEng=state.measEng, fBill=state.measBill, fBlk=state.measBlock||'all', filtered=!!(fEng||fBill);
  let sanc=sancMeasOfItem(it.ItemID), actual=actualMeasOfItem(it.ItemID);
  if(fEng){ sanc=sanc.filter(s=>String(s.Engineer||'').trim()===fEng); actual=actual.filter(a=>measEngineer(a)===fEng); }
  // बिल फ़िल्टर — इस आइटम में उस बिल का कोई भुगतान है?
  const detInBill=(m)=>detailsOf('MeasID',m.MeasID).filter(d=>!fBill || String(d.PayID)===String(fBill));
  if(filtered){
    const anyBill = !fBill || actual.some(m=>detInBill(m).length);
    if((fEng && !sanc.length && !actual.length) || !anyBill) return '';   // इस आइटम में फ़िल्टर अनुसार कुछ नहीं
  }
  // फ़िल्टर अनुसार टोटल
  let fPaidQ=0, fPaidA=0;
  actual.forEach(m=>detInBill(m).forEach(d=>{ fPaidQ+=toNum(d.Qty); fPaidA+=toNum(d.Amount); }));
  fPaidQ=round(fPaidQ,3); fPaidA=round(fPaidA,2);
  const sQ = filtered ? round(paySum(sanc,measQty),3) : itemSancQty(it);
  const mQ = filtered ? round(paySum(actual,measQty),3) : itemMeasQty(it);
  const pQ = filtered ? fPaidQ : itemPaidQty(it);
  const rQ = round(mQ-pQ,3);

  // ---- भाग 1: निर्धारित नाप (स्वीकृति के अनुसार) — हर लाइन के सापेक्ष कितना नापा/शेष ----
  const sancTbId='sanc-tb-'+String(it.ItemID).replace(/[^a-z0-9_-]/gi,'_');
  const sTerm=((state.sancSearch||{})[String(it.ItemID)]||'');
  const sancRows = sanc.map(function(m, idx){
    const mq=measQty(m), meas=sancMeasuredQty(m.MeasID), rem=round(mq-meas,3);
    const st = meas>mq+0.0005 ? '<span class="badge b-red" style="font-size:10px">अधिक नाप</span>'
      : (rem<=0.0005 ? '<span class="badge b-green" style="font-size:10px">पूर्ण नाप</span>'
      : (meas>0 ? '<span class="badge b-amber" style="font-size:10px">आंशिक</span>' : '<span class="badge b-grey" style="font-size:10px">शेष</span>'));
    const over=meas>mq+0.0005;
    const srch=[String(m.Description||''),chRange(m)||'',sideLabel(m)||'',String(m.Nos1||''),String(m.Nos2||''),String(m.Length||''),String(m.Breadth||''),String(m.Depth||''),nf2(mq),nf2(meas),nf2(rem),unit,measEngineer(m)||''].join(' ').toLowerCase();
    const hide=sTerm && srch.indexOf(sTerm)===-1;
    return `<tr data-search="${esc(srch)}"${hide?' style="display:none"':''}>${leadCells(m)}
      <td class="r num"><b>${nf2(mq)}</b></td>
      <td class="r num" style="color:var(--accent)">${nf2(meas)}</td>
      <td class="r num" style="color:var(--red-2)">${over?`<span style="background:#fef9c3">${nf2(rem)}</span>`:nf2(rem)}</td>
      <td class="c muted">${unit}</td><td class="c">${st}</td>
      <td class="faint">${esc(measEngineer(m))||'—'}</td>
      <td><div class="row-actions" style="align-items:center">
        <button class="btn btn-ghost btn-sm" title="इसके सापेक्ष साइट-नाप जोड़ें/संपादित (builder)" onclick='openMeasBuilder(${JSON.stringify(m.MeasID)})'>＋ नाप</button>
        <button class="icon-btn" title="निर्धारित नाप संपादित (linear builder)" onclick='openSancBuilder(${iid})'>✎</button>
        <button class="icon-btn danger" title="हटाएँ" onclick='delMeas(${JSON.stringify(m.MeasID)})'>🗑</button>
        <button class="icon-btn" style="width:15px;height:15px;font-size:8px;padding:0;border-radius:4px${idx===0?';opacity:.25;pointer-events:none':''}" title="ऊपर ले जाएँ" onclick='moveSancLine(${JSON.stringify(m.MeasID)},-1)'>▲</button>
        <button class="icon-btn" style="width:15px;height:15px;font-size:8px;padding:0;border-radius:4px${idx===sanc.length-1?';opacity:.25;pointer-events:none':''}" title="नीचे ले जाएँ" onclick='moveSancLine(${JSON.stringify(m.MeasID)},1)'>▼</button>
      </div></td></tr>`;
  }).join('');
  const sancSearch=sanc.length>1?`<input id="${sancTbId}-q" class="inp" style="width:140px;font-size:13px;padding:4px 8px;margin-right:4px" placeholder="🔍 पंक्ति खोजें..." value="${esc(sTerm)}" onkeydown='if(event.key==="Enter"){event.preventDefault();filterSancRows(${JSON.stringify(sancTbId)},${iid})}'> <button class="btn btn-ghost btn-sm" style="margin-right:6px" onclick='filterSancRows(${JSON.stringify(sancTbId)},${iid})'>Search</button><button class="btn btn-ghost btn-sm" style="margin-right:6px" onclick='clearSancFilter(${JSON.stringify(sancTbId)},${iid})'>Clear</button>`:'';
  const sancBtn=`${sancSearch}${sanc.length>1?`<button class="btn btn-ghost btn-sm" title="मैनुअल क्रम हटाकर पक्ष→चैनेज अनुसार स्वतः क्रम" onclick='autoArrangeSanc(${iid})'>↕ Auto Arrange</button> `:''}<button class="btn btn-primary btn-sm" onclick='openSancBuilder(${iid})'><span class="ic">＋</span> निर्धारित नाप (builder)</button>`;
  const block1=blockTable('① निर्धारित नाप (स्वीकृति के अनुसार)', `स्वीकृत योग: ${nf2(sQ)} ${unit} · इन्हीं के सापेक्ष साइट-नाप होती है`,
    `<th class="r">निर्धारित</th><th class="r">नापी गई</th><th class="r">शेष नाप</th><th class="c">इकाई</th><th class="c">स्थिति</th><th>अभियंता</th><th></th>`,
    sancRows, 15, sancBtn, sancTbId);

  // ---- भाग 2: भुगतान हो चुका (वास्तविक नाप × बिल) ----
  let paidRows='';
  actual.forEach(function(m){
    detInBill(m).forEach(function(d){
      const p=D().payments.find(x=>String(x.PayID)===String(d.PayID))||{};
      paidRows += `<tr>${leadCells(m)}
        <td class="faint">${esc(sancRefLabel(m))||'—'}</td>
        <td class="r num" style="color:var(--green)"><b>${nf2(d.Qty)}</b></td><td class="c muted">${unit}</td>
        <td><b>${esc(p.BillNo||'—')}</b> <span class="badge ${p.BillType==='अंतिम'?'b-blue':'b-grey'}" style="font-size:10px">${esc(p.BillType||'चालू')}</span></td>
        ${mbTd(m)}<td class="muted">${dmy(m.MDate)}</td>${recTd(m)}
        <td><div class="row-actions">
          <button class="icon-btn" title="भुगतान/बिल संख्या संपादित" onclick='openPayBuilder(${JSON.stringify(d.PayID)})'>✎</button>
          <button class="icon-btn danger" title="यह भुगतान हटाएँ" onclick='delPayDetail(${JSON.stringify(d.PayID)},${JSON.stringify(m.MeasID)})'>🗑</button>
        </div></td></tr>`;
    });
  });
  const block2=blockTable('② भुगतान हो चुका', `भुगतान मात्रा योग: ${nf2(pQ)} ${unit} · राशि ${inr(fPaidA)}`,
    `<th>संबंधित निर्धारित</th><th class="r">भु. मात्रा</th><th class="c">इकाई</th><th>बिल संख्या</th><th>MB / पृष्ठ</th><th>दिनांक</th><th>Record MB / तारीख</th><th></th>`,
    paidRows, 16, '');

  // ---- भाग 3: बचा हुआ (वास्तविक नाप का शेष) — ऋणात्मक मात्रा (कटौती/समायोजन) वाली नाप भी यहाँ दिखेगी, जब तक उसका भुगतान/समायोजन न हो जाए ----
  let remRows='';
  actual.forEach(function(m){
    const rem=measRemain(m);
    if(Math.abs(rem)>0.0005){
      const paid=measPaid(m.MeasID);
      const st = rem<0 ? '<span class="badge b-red" style="font-size:10px">➖ ऋणात्मक समायोजन</span>'
        : (paid>0 ? '<span class="badge b-amber" style="font-size:10px">आंशिक</span>' : '<span class="badge b-grey" style="font-size:10px">शेष</span>');
      remRows += `<tr>${leadCells(m)}
        <td class="faint">${esc(sancRefLabel(m))||'—'}</td>
        <td class="r num" style="color:var(--red-2)"><b>${nf2(rem)}</b></td><td class="c muted">${unit}</td>
        <td class="c">${st}</td>${mbTd(m)}<td class="muted">${dmy(m.MDate)}</td>
        <td><div class="row-actions">
          <button class="icon-btn" title="भुगतान इतिहास" onclick='measHistory(${JSON.stringify(m.MeasID)})'>☷</button>
          <button class="icon-btn" title="संपादित" onclick='openMeasModal(${JSON.stringify(m.MeasID)})'>✎</button>
          <button class="icon-btn danger" title="हटाएँ" onclick='delMeas(${JSON.stringify(m.MeasID)})'>🗑</button>
        </div></td></tr>`;
    }
  });
  const block3=blockTable('③ Record हो गया, लेकिन भुगतान शेष है', `शेष भुगतान-योग्य मात्रा: ${nf2(rQ)} ${unit}`,
    `<th>संबंधित निर्धारित</th><th class="r">शेष मात्रा</th><th class="c">इकाई</th><th class="c">स्थिति</th><th>Record MB/Page</th><th>दिनांक</th><th></th>`,
    remRows, 15, '');

  const ignored = state.ignoredOverlaps||[];
  const pairs = overlapList(sanc,'sanc').map(p=>({sig:p.sig,text:'निर्धारित — '+p.text}))
    .concat(overlapList(actual,'actual').map(p=>({sig:p.sig,text:'साइट — '+p.text})));
  const shown = pairs.filter(p=>ignored.indexOf(p.sig)===-1);
  const warnBanner = shown.length
    ? `<div class="mb-warn" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:0 0 12px">
        <span>⚠ चैनेज overlap: ${shown.map(p=>esc(p.text)).join(' · ')}</span>
        <button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick='ignoreOverlapSigs(${JSON.stringify(shown.map(p=>p.sig))})'>Ignore</button></div>` : '';

  const u=it.Unit?(' '+unit):'';
  const bSt='font-size:14.5px;padding:9px 14px;line-height:1.2';
  const wd=workDev(mQ,sQ);
  const fBillNo = fBill ? ((D().payments.find(p=>String(p.PayID)===String(fBill))||{}).BillNo||'') : '';
  const fNote = filtered ? `<span class="badge b-grey" style="${bSt}">🔎 ${esc([fEng, fBillNo?('बिल '+fBillNo):''].filter(Boolean).join(' · '))||'फ़िल्टर'} — आइटम टोटल</span>` : '';
  const badges=`<div style="display:flex;gap:10px;flex-wrap:wrap;margin:0 0 14px">
    ${fNote}
    <span class="badge b-blue" style="${bSt}">कुल निर्धारित: ${nf2(sQ)}${u}</span>
    <span class="badge b-green" style="${bSt}">कुल भुगतान हो चुका: ${nf2(pQ)}${u}</span>
    <span class="badge b-amber" style="${bSt}">भुगतान हेतु शेष: ${nf2(rQ)}${u}</span>
    <span class="badge b-red" style="${bSt}">कार्य कराया जाना शेष: ${nf2(round(sQ-mQ,3))}${u}</span>
    <span class="badge ${wd.badge}" style="${bSt}">कार्य: ${wd.txt}</span></div>`;

  return `<div class="card" style="padding:14px 16px 6px;margin-bottom:20px">
    <div class="section-head" style="margin-bottom:10px">
      <span class="item-no">${esc(it.ItemNo)}</span>
      <h2 style="font-size:16px">${esc(it.Description)}</h2>
      <span class="sub">इकाई ${unit} · दर ${inr(itemRate(it))}</span></div>
    ${badges}${warnBanner}${(fBlk==='all'||fBlk==='sanc')?block1:''}${(fBlk==='all'||fBlk==='paid')?block2:''}${(fBlk==='all'||fBlk==='rem')?block3:''}</div>`;
}

/* ===================================================================
   Payments  (list)
=================================================================== */
function viewPay(){
  const t=totals();
  const head=`<div class="section-head"><h2>भुगतान / RA Bill</h2>
    <span class="sub">कुल भुगतान ${inr(t.paid)} · ${D().payments.length} बिल</span>
    <div class="spacer"></div>
    <button class="btn btn-primary" onclick="openPayBuilder()" ${items().length?'':'disabled style=opacity:.5'}><span class="ic">＋</span> नया भुगतान बनाएँ</button></div>`;
  if(!items().length) return head+emptyCard('₹','पहले आइटम व नाप जोड़ें','भुगतान नापी गई मात्रा पर बनता है — पहले आइटम और नाप दर्ज करें।','आइटम पर जाएँ','switchTab(\'items\')');
  if(!D().payments.length) return head+emptyCard('₹','कोई भुगतान नहीं','"नया भुगतान बनाएँ" पर क्लिक करके नाप-लाइन चुनें और RA बिल बनाएँ।','नया भुगतान','openPayBuilder()');

  // फ़िल्टर विकल्प
  const bills=D().payments.slice().sort((a,b)=>String(a.BillNo||'').localeCompare(String(b.BillNo||'')));
  const billOpts='<option value="">— सभी बिल —</option>'+bills.map(p=>`<option value="${esc(p.PayID)}" ${state.payBill===p.PayID?'selected':''}>${esc(p.BillNo||'(बिना नाम)')}</option>`).join('');
  const itemOpts='<option value="">— सभी आइटम —</option>'+items().map(it=>`<option value="${esc(it.ItemID)}" ${state.payItem===it.ItemID?'selected':''}>${esc(it.ItemNo)} · ${esc(it.Description)}</option>`).join('');
  const engs=projectEngineers();
  const engOpts='<option value="">— सभी अभियंता —</option>'+engs.map(e=>`<option ${state.payEng===e?'selected':''}>${esc(e)}</option>`).join('');
  const selP2 = state.payBill ? (D().payments.find(x=>String(x.PayID)===String(state.payBill))||null) : null;
  const dupCount = selP2 ? D().payments.filter(x=>String(x.BillNo||'')===String(selP2.BillNo||'')&&String(x.PayID)!==String(selP2.PayID)).length : 0;
  const billBtns = selP2 ? `
    <button class="btn btn-ghost btn-sm danger" title="चयनित बिल हटाएँ" onclick='delPay(${JSON.stringify(selP2.PayID)})' style="flex-shrink:0;padding:6px 10px">🗑 हटाएँ</button>
    ${dupCount?`<button class="btn btn-ghost btn-sm" title="समान नाम के ${dupCount+1} बिल को एक में मर्ज करें" onclick='mergeIntoBill(${JSON.stringify(selP2.PayID)})' style="flex-shrink:0;padding:6px 10px;color:var(--accent)">🔀 मर्ज (${dupCount} डुप्लीकेट)</button>`:''}` : '';
  const toolbar=`<div class="toolbar">
    <div class="field" style="min-width:150px"><label>भुगतान / बिल संख्या</label>
      <div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center">
        <select class="inp" style="flex:1;min-width:120px" onchange="state.payBill=this.value; render()">${billOpts}</select>${billBtns}
      </div></div>
    <div class="field" style="min-width:210px"><label>आइटम का नाम</label><select class="inp" onchange="state.payItem=this.value; render()">${itemOpts}</select></div>
    ${engs.length?`<div class="field" style="min-width:180px"><label>अवर अभियंता</label><select class="inp" onchange="state.payEng=this.value; render()">${engOpts}</select></div>`:''}
    <div class="field" style="min-width:170px"><label>दृश्य</label><select class="inp" onchange="state.payView=this.value; render()">
      <option value="item" ${(state.payView||'item')==='item'?'selected':''}>आइटम-वार (कुल मात्रा)</option>
      <option value="line" ${state.payView==='line'?'selected':''}>लाइन-वार (विस्तृत)</option></select></div>
    ${(state.payBill||state.payItem||state.payEng)?`<button class="btn btn-ghost btn-sm" style="align-self:flex-end" onclick="state.payBill='';state.payItem='';state.payEng='';render()">फ़िल्टर हटाएँ</button>`:''}</div>`;

  // फ़िल्टर अनुसार भुगतान-लाइनें
  const fB=state.payBill, fI=state.payItem, fE=state.payEng;
  const list=D().paymentDetails.filter(function(d){
    if(fB && String(d.PayID)!==String(fB)) return false;
    if(fI && String(d.ItemID)!==String(fI)) return false;
    if(fE){ const mm=D().measurements.find(x=>String(x.MeasID)===String(d.MeasID)); if(measEngineer(mm)!==fE) return false; }
    return true;
  });
  // बिल-तारीख → आइटम क्रम
  list.sort(function(a,b){ const pa=D().payments.find(x=>String(x.PayID)===String(a.PayID))||{}, pb=D().payments.find(x=>String(x.PayID)===String(b.PayID))||{};
    const c=String(pb.PDate||'').localeCompare(String(pa.PDate||'')); if(c) return c;
    const ia=itemById(a.ItemID)||{}, ib=itemById(b.ItemID)||{}; return toNum(ia.ItemNo)-toNum(ib.ItemNo); });

  let tq=0, ta=0, rows='', thead='', totRow='';
  const view = state.payView || 'item';

  if(view==='item'){
    // ---- आइटम-वार: हर आइटम की सभी मात्रा जुड़कर कुल (updated quantity) ----
    const groups={}, order=[];
    list.forEach(function(d){
      const k=String(d.ItemID);
      if(!groups[k]){ groups[k]={qty:0, amt:0, rates:{}, bills:{}, engs:{}}; order.push(k); }
      const g=groups[k]; g.qty+=toNum(d.Qty); g.amt+=toNum(d.Amount); g.rates[round(toNum(d.Rate),2)]=1;
      const p=D().payments.find(x=>String(x.PayID)===String(d.PayID))||{}; if(p.BillNo) g.bills[p.BillNo]=1;
      const mm=D().measurements.find(x=>String(x.MeasID)===String(d.MeasID))||{}; const e=measEngineer(mm); if(e) g.engs[e]=1;
    });
    order.sort((a,b)=>{ const ia=itemById(a)||{}, ib=itemById(b)||{}; return toNum(ia.ItemNo)-toNum(ib.ItemNo) || String(ia.ItemNo).localeCompare(String(ib.ItemNo)); });
    rows=order.map(function(k){
      const it=itemById(k)||{}, g=groups[k]; tq+=g.qty; ta+=g.amt;
      const rks=Object.keys(g.rates); const rate=rks.length===1?('₹'+nf2(rks[0])):'मिश्र';
      const detail=String(it.DetailDesc||'').trim();
      return `<tr>
        <td><span class="item-no">${esc(it.ItemNo||'')}</span></td>
        <td style="max-width:300px"><b>${esc(it.Description||'')}</b>${detail?`<div class="faint">${esc(snip(detail,120))}</div>`:''}</td>
        <td class="c muted">${esc(it.Unit||'—')}</td>
        <td class="r num" style="color:${g.qty<0?'var(--red-2)':'var(--green)'}"><b>${nf2(g.qty)}</b></td>
        <td class="r num">${rate}</td>
        <td class="r num" style="color:${g.amt<0?'var(--red-2)':'var(--green)'}"><b>${inr(g.amt)}</b></td>
        <td class="faint">${esc(Object.keys(g.bills).join(', '))||'—'}</td>
        <td class="faint">${esc(Object.keys(g.engs).join(', '))||'—'}</td></tr>`;
    }).join('') || `<tr><td colspan="8" class="muted" style="text-align:center;padding:16px">फ़िल्टर अनुसार कोई भुगतान नहीं</td></tr>`;
    thead=`<th>आइटम</th><th>विवरण (short + detail)</th><th class="c">इकाई</th><th class="r">कुल भु. मात्रा</th><th class="r">दर</th><th class="r">कुल राशि</th><th>बिल</th><th>अभियंता</th>`;
    totRow=`<tr style="font-weight:700;background:#f1f5fa"><td colspan="4" style="text-align:right">राशि योग →</td>
      <td></td><td class="r num" style="color:var(--green)">${inr(ta)}</td><td colspan="2"></td></tr>`;
  } else {
    // ---- लाइन-वार: विस्तृत (हर भुगतान-लाइन) ----
    rows=list.map(function(d){
      const it=itemById(d.ItemID)||{}; const p=D().payments.find(x=>String(x.PayID)===String(d.PayID))||{};
      const mm=D().measurements.find(x=>String(x.MeasID)===String(d.MeasID))||{};
      const detail=String(it.DetailDesc||'').trim();
      tq+=toNum(d.Qty); ta+=toNum(d.Amount);
      return `<tr>
        <td><span class="item-no">${esc(it.ItemNo||'')}</span></td>
        <td style="max-width:300px"><b>${esc(it.Description||'')}</b>${detail?`<div class="faint">${esc(snip(detail,120))}</div>`:''}</td>
        <td class="c muted">${esc(it.Unit||'—')}</td>
        <td class="r num" style="color:${toNum(d.Qty)<0?'var(--red-2)':'var(--green)'}"><b>${nf2(d.Qty)}</b></td>
        <td class="r num">${inr(d.Rate)}</td>
        <td class="r num" style="color:${toNum(d.Amount)<0?'var(--red-2)':'var(--green)'}">${inr(d.Amount)}</td>
        <td class="faint">${esc(p.MBNo||'—')}${p.MBPages?(' / पृ.'+esc(p.MBPages)):''}</td>
        <td class="muted">${dmy(p.PDate)}</td>
        <td><b>${esc(p.BillNo||'—')}</b></td>
        <td class="faint">${esc(measEngineer(mm))||'—'}</td>
        <td><div class="row-actions">
          <button class="icon-btn" title="बिल संपादित" onclick='openPayBuilder(${JSON.stringify(d.PayID)})'>✎</button>
          <button class="icon-btn danger" title="यह भुगतान-लाइन हटाएँ" onclick='delPayDetail(${JSON.stringify(d.PayID)},${JSON.stringify(d.MeasID)})'>🗑</button>
        </div></td></tr>`;
    }).join('') || `<tr><td colspan="11" class="muted" style="text-align:center;padding:16px">फ़िल्टर अनुसार कोई भुगतान-लाइन नहीं</td></tr>`;
    thead=`<th>आइटम</th><th>विवरण (short + detail)</th><th class="c">इकाई</th><th class="r">भु. मात्रा</th><th class="r">दर</th><th class="r">राशि</th><th>MB / पृष्ठ</th><th>दिनांक</th><th>बिल</th><th>अभियंता</th><th></th>`;
    totRow=`<tr style="font-weight:700;background:#f1f5fa"><td colspan="4" style="text-align:right">राशि योग →</td>
      <td></td><td class="r num" style="color:var(--green)">${inr(ta)}</td><td colspan="5"></td></tr>`;
  }
  const selP = state.payBill ? (D().payments.find(x=>String(x.PayID)===String(state.payBill))||null) : null;
  const allBillChips = D().payments.slice().sort((a,b)=>String(a.BillNo||'').localeCompare(String(b.BillNo||''))).map(p=>
    `<span style="display:inline-flex;align-items:center;gap:3px;padding:3px 8px;background:var(--surface-2);border:1px solid var(--line);border-radius:8px;font-size:12px">
      <b>${esc(p.BillNo||'—')}</b><span class="muted" style="font-size:11px">${dmy(p.PDate)}</span>
      <button class="icon-btn" style="width:20px;height:20px;font-size:11px;margin-left:2px" title="संपादित" onclick='openPayBuilder(${JSON.stringify(p.PayID)})'>✎</button>
      <button class="icon-btn danger" style="width:20px;height:20px;font-size:11px" title="हटाएँ" onclick='delPay(${JSON.stringify(p.PayID)})'>🗑</button>
    </span>`).join('');
  const billInfo = selP
    ? `<span class="badge b-amber" style="font-size:13px;padding:7px 12px">बिल ${esc(selP.BillNo||'—')} · MB ${esc(selP.MBNo||'—')}${selP.MBPages?(' / पृ.'+esc(selP.MBPages)):''} · दिनांक ${dmy(selP.PDate)}</span>`
    : `<div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center"><span class="muted" style="font-size:12px">सभी बिल:</span>${allBillChips}</div>`;
  const summary=`<div class="card" style="padding:10px 14px;margin-bottom:12px;display:flex;gap:14px;flex-wrap:wrap;align-items:center;background:var(--surface-2)">
    ${billInfo}
    <span class="badge b-grey" style="font-size:13px;padding:7px 12px">${view==='item'?'आइटम':'लाइनें'}: ${view==='item'?(new Set(list.map(d=>String(d.ItemID))).size):list.length}</span>
    <span class="badge b-blue" style="font-size:13px;padding:7px 12px">कुल मात्रा: ${nf2(tq)}</span>
    <span class="badge b-green" style="font-size:13px;padding:7px 12px">कुल राशि: ${inr(ta)}</span></div>`;
  const billDetail = selP ? `<div class="card" style="padding:14px 16px;margin-top:14px">
    <div class="section-head" style="margin-bottom:0"><h2 style="font-size:14px">बिल ${esc(selP.BillNo||'—')} का पूरा विवरण</h2>
      <span class="sub">कटौती, Advance, Withheld, GST व सांविधिक कटौतियों सहित</span></div>
    ${payBreakdownHtml(selP)}</div>` : '';
  return head+toolbar+summary+`<div class="card tbl-wrap"><table class="sep">
    <thead><tr>${thead}</tr></thead>
    <tbody>${rows}${totRow}</tbody></table></div>`+billDetail;
}

=================================================================== */
/* अभियंता-वार रिपोर्ट — किस आइटम में निर्धारित/नापी/भुगतान मात्रा व राशि, और बिल-वार राशि */
function engineerReportHtml(eng){
  const its=items();
  let rows='', tS=0,tM=0,tPq=0,tPa=0;
  its.forEach(function(it){
    const sancE=sancMeasOfItem(it.ItemID).filter(s=>String(s.Engineer||'').trim()===eng);
    if(!sancE.length) return;
    const sancIds=sancE.map(s=>String(s.MeasID));
    const actE=actualMeasOfItem(it.ItemID).filter(a=>sancIds.indexOf(String(a.SancRef))>=0);
    const sQ=round(paySum(sancE,measQty),3), mQ=round(paySum(actE,measQty),3);
    let pq=0,pa=0; actE.forEach(a=>detailsOf('MeasID',a.MeasID).forEach(d=>{pq+=toNum(d.Qty);pa+=toNum(d.Amount);}));
    pq=round(pq,3); pa=round(pa,2);
    tS+=sQ;tM+=mQ;tPq+=pq;tPa+=pa;
    rows+=`<tr><td><span class="item-no">${esc(it.ItemNo)}</span></td><td><b>${esc(it.Description)}</b><div class="faint">${esc(it.Unit||'')}</div></td>
      <td class="r num">${nf2(sQ)}</td><td class="r num" style="color:var(--accent)">${nf2(mQ)}</td>
      <td class="r num" style="color:var(--green)">${nf2(pq)}</td><td class="r num" style="color:var(--red-2)">${nf2(round(sQ-pq,3))}</td>
      <td class="r num" style="color:var(--green)">${inr(pa)}</td></tr>`;
  });
  if(!rows) rows=`<tr><td colspan="7" class="muted" style="text-align:center;padding:14px">इस अभियंता के नाम कोई निर्धारित नाप नहीं</td></tr>`;
  const totRow=`<tr style="font-weight:700;background:#f1f5fa"><td colspan="2" style="text-align:right">योग →</td>
    <td class="r num">${nf2(tS)}</td><td class="r num" style="color:var(--accent)">${nf2(tM)}</td>
    <td class="r num" style="color:var(--green)">${nf2(tPq)}</td><td class="r num" style="color:var(--red-2)">${nf2(round(tS-tPq,3))}</td>
    <td class="r num" style="color:var(--green)">${inr(tPa)}</td></tr>`;
  // बिल-वार राशि (इसी अभियंता की)
  const billMap={};
  its.forEach(function(it){
    const sancIds=sancMeasOfItem(it.ItemID).filter(s=>String(s.Engineer||'').trim()===eng).map(s=>String(s.MeasID));
    actualMeasOfItem(it.ItemID).filter(a=>sancIds.indexOf(String(a.SancRef))>=0).forEach(a=>{
      detailsOf('MeasID',a.MeasID).forEach(d=>{ if(!billMap[d.PayID])billMap[d.PayID]={q:0,a:0}; billMap[d.PayID].q+=toNum(d.Qty); billMap[d.PayID].a+=toNum(d.Amount); });
    });
  });
  const billRows=Object.keys(billMap).map(function(pid){
    const p=D().payments.find(x=>String(x.PayID)===String(pid))||{}; const b=billMap[pid];
    return `<tr><td><b>${esc(p.BillNo||'—')}</b> <span class="badge ${p.BillType==='अंतिम'?'b-blue':'b-grey'}" style="font-size:10px">${esc(p.BillType||'चालू')}</span></td>
      <td class="muted">${dmy(p.PDate)}</td><td class="muted">${esc(p.MBNo||'—')}</td>
      <td class="r num">${nf2(round(b.q,3))}</td><td class="r num" style="color:var(--green)">${inr(round(b.a,2))}</td></tr>`;
  }).join('') || `<tr><td colspan="5" class="muted" style="text-align:center;padding:14px">कोई भुगतान नहीं</td></tr>`;
  return `<div class="card" style="padding:14px 16px;margin-bottom:22px;border:2px solid var(--ink-2)">
    <div class="section-head" style="margin-bottom:10px"><h2 style="font-size:16px">👷 अभियंता: ${esc(eng)}</h2>
      <span class="sub">इनके नाम निर्धारित मद, नाप व भुगतान</span></div>
    <div class="tbl-wrap" style="border:1px solid var(--line);border-radius:10px;margin-bottom:14px"><table>

function viewReport(){
  const its=items(); const t=totals();
  if(!its.length) return emptyCard('⚖','तुलना के लिए डेटा नहीं','पहले आइटम, नाप व भुगतान जोड़ें फिर यहाँ स्वीकृत-बनाम-भुगतान तुलना देखें।','आइटम पर जाएँ','switchTab(\'items\')');

  const dOpt=(v,l)=>`<option value="${v}" ${state.reportDetail===v?'selected':''}>${l}</option>`;
  const engs=projectEngineers();
  const engSel=`<div class="field no-print" style="min-width:190px"><label>अवर अभियंता (फ़िल्टर)</label>
      <select class="inp" onchange="state.reportEng=this.value; render()">
        <option value="">— सभी —</option>${engs.map(e=>`<option ${state.reportEng===e?'selected':''}>${esc(e)}</option>`).join('')}</select></div>`;
  const head=`<div class="section-head no-print"><h2>तुलना / रिपोर्ट</h2><span class="sub">स्वीकृत बनाम नापा बनाम भुगतान</span>
    <div class="spacer"></div>
    ${engs.length?engSel:''}
    <div class="field" style="min-width:170px"><label>मद विवरण (प्रिंट)</label>
      <select class="inp" onchange="state.reportDetail=this.value; render()">${dOpt('none','छिपाएँ')}${dOpt('short','आंशिक (~150)')}${dOpt('full','पूरा')}</select></div>
    <button class="btn btn-ghost" onclick="window.print()"><span class="ic">🖨</span> प्रिंट / PDF</button></div>
    ${state.reportEng?engineerReportHtml(state.reportEng):''}
    <div class="print-only" style="margin-bottom:14px">
      <h2 style="color:var(--ink)">${esc(state.data.project.name||'सड़क कार्य')} — भुगतान तुलना रिपोर्ट</h2>
      <p class="muted">ठेकेदार: ${esc(state.data.project.contractor||'—')} · कार्यादेश: ${esc(state.data.project.workOrder||'—')} · दिनांक: ${dmy(todayISO())}</p></div>`;

  // item comparison table
  let rows=its.map(function(it){
    const sq=itemSancQty(it),mq=itemMeasQty(it),pq=itemPaidQty(it);
    const sa=itemSancAmt(it),ma=itemMeasAmt(it),pa=itemPaidAmt(it);
    const detail=String(it.DetailDesc||'').trim();
    const dHtml=(state.reportDetail==='none'||!detail)?'':`<div class="faint" style="font-size:11.5px;margin-top:3px;white-space:normal">${esc(state.reportDetail==='full'?detail:snip(detail,150))}</div>`;
    return `<tr>
      <td><span class="item-no">${esc(it.ItemNo)}</span></td>
      <td style="max-width:340px"><b>${esc(it.Description)}</b><div class="faint">${esc(it.Unit||'')} · ${inr(itemRate(it))}</div>${dHtml}</td>
      <td class="r num">${qf(sq)}</td>
      <td class="r num" style="color:var(--accent)">${qf(mq)}</td>
      <td class="r num" style="color:var(--green)">${qf(pq)}</td>
      <td class="r num" style="color:var(--red-2)">${qf(round(sq-pq,3))}</td>
      <td class="r num">${inr(sa)}</td>
      <td class="r num" style="color:var(--green)">${inr(pa)}</td>
      <td class="r num" style="color:var(--red-2)">${inr(round(sa-pa,2))}</td>
    </tr>`;
  }).join('');
  const totRow=`<tr style="font-weight:700;background:#f1f5fa">
    <td colspan="6" style="text-align:right">योग →</td>
    <td class="r num">${inr(t.sanc)}</td>
    <td class="r num" style="color:var(--green)">${inr(t.paid)}</td>
    <td class="r num" style="color:var(--red-2)">${inr(t.balSanc)}</td></tr>`;
  const compTbl=`<div class="card tbl-wrap" style="margin-bottom:22px"><table>
    <thead><tr><th>क्र.</th><th>आइटम</th><th class="r">स्वीकृत मा.</th><th class="r">नापी मा.</th><th class="r">भुगतान मा.</th><th class="r">शेष मा.</th>
    <th class="r">स्वीकृत राशि</th><th class="r">भुगतान राशि</th><th class="r">शेष राशि</th></tr></thead>
    <tbody>${rows}${totRow}</tbody></table></div>`;

  // छूटा भाग — measured but unpaid (ऋणात्मक मात्रा/समायोजन वाली नाप भी शामिल, जब तक भुगतान न हो जाए)
  let leftRows='';
  its.forEach(function(it){
    actualMeasOfItem(it.ItemID).forEach(function(m){
      const rem=measRemain(m);
      if(Math.abs(rem)>0.0005){
        leftRows+=`<tr>
          <td><span class="item-no">${esc(it.ItemNo)}</span></td>
          <td>${esc(measName(m))}<div class="faint">${esc(m.MBNo||'')}${m.MBPage?(' / पृ. '+esc(m.MBPage)):''}</div></td>
          <td class="r num">${qf(measQty(m))}</td>
          <td class="r num" style="color:var(--green)">${qf(measPaid(m.MeasID))}</td>
          <td class="r num" style="color:var(--red-2)"><b>${qf(rem)}</b></td>
          <td class="r num" style="color:var(--red-2)">${inr(round(rem*itemRate(it),2))}</td>
        </tr>`;
      }
    });
  });
  const leftCard = leftRows
    ? `<div class="section-head"><h2>छूटा हुआ / शेष भाग</h2><span class="sub">नापा गया पर अभी भुगतान बाकी</span></div>
       <div class="card tbl-wrap" style="margin-bottom:22px"><table>
       <thead><tr><th>क्र.</th><th>नाप विवरण</th><th class="r">कुल मात्रा</th><th class="r">भुगतान</th><th class="r">शेष मात्रा</th><th class="r">शेष राशि</th></tr></thead>
       <tbody>${leftRows}</tbody></table></div>`
    : `<div class="card" style="padding:18px;margin-bottom:22px;color:var(--green);font-weight:600">✓ नापी गई सभी मात्रा का भुगतान हो चुका है — कोई शेष भाग नहीं।</div>`;

  // payment ledger
  const ps=D().payments.slice().sort((a,b)=>String(a.PDate).localeCompare(String(b.PDate)));
  let run=0; let ledger=ps.map(function(p){ run+=toNum(p.TotalAmount);
    return `<tr><td><b>${esc(p.BillNo||'—')}</b></td><td class="muted">${dmy(p.PDate)}</td>
      <td class="muted">${esc(p.MBNo||'—')}${p.MBPages?(' / पृ. '+esc(p.MBPages)):''}</td>
      <td class="r num">${inr(p.TotalAmount)}</td><td class="r num" style="color:var(--ink-2);font-weight:600">${inr(run)}</td></tr>`;
  }).join('') || `<tr><td colspan="5" class="muted" style="text-align:center;padding:16px">कोई भुगतान नहीं</td></tr>`;
  const ledgerCard=`<div class="section-head"><h2>भुगतान बही (Ledger)</h2><span class="sub">क्रमिक भुगतान व संचयी योग</span></div>
    <div class="card tbl-wrap"><table>
    <thead><tr><th>बिल</th><th>तारीख</th><th>MB</th><th class="r">राशि</th><th class="r">संचयी भुगतान</th></tr></thead>
    <tbody>${ledger}</tbody></table></div>`;

  return head+`<div class="section-head"><h2>आइटमवार तुलना</h2></div>`+compTbl+leftCard+ledgerCard;
}

      <input type="checkbox" id="st_${key}On" ${payBoolJs(p[key+'On'])?'checked':''}>

      <div class="pb-card-head"><span class="pb-ic">🧾</span><b>डिफ़ॉल्ट सांविधिक कटौतियाँ</b><span class="hint">नए बिल में स्वतः भरेंगी</span></div>
      <p class="desc">यह सेटिंग <b>सभी परियोजनाओं के लिए Common</b> है। यहाँ भरा % मान हर <b>नए</b> भुगतान / RA बिल में स्वतः भर जाएगा। जिन बिलों का <b>"Payment" (चेक जारी)</b> बटन दबाकर भुगतान फ़्रीज़ किया जा चुका है, उन पर बाद में किया गया बदलाव कोई असर नहीं डालेगा।</p>

        ${row('IncomeTax','T14','Income Tax','🧾')}

      </div>

    </div>

    <div class="card settings-card">
      <div class="pb-card-head"><span class="pb-ic">📐</span><b>इकाई (Unit) प्रबंधन</b><span class="hint">${units.length} इकाइयाँ · सभी परियोजनाओं में उपलब्ध</span></div>

      <div class="unit-list">${unitRows}</div>
      <div class="unit-add">
        <input id="nu_name" class="inp" placeholder="नई इकाई का नाम — जैसे किलोग्राम">
        <div class="unit-dims">${UNIT_DIM_FIELDS.map(([f,lbl])=>`<label class="dim-chip on"><input type="checkbox" id="nu_${f}" checked>${lbl}</label>`).join('')}</div>

}
function toggleUnitDim(idx, field, checked){
  const list=unitConfigs().slice();
  if(!list[idx]) return;
  list[idx]=Object.assign({}, list[idx], {[field]:checked});
  persistUnitConfigs(list);
}
function deleteUnitConfig(idx){
  const list=unitConfigs().slice();
  const u=list[idx]; if(!u) return;
  if(!confirm('"'+u.name+'" इकाई हटाएं?\n\nइस इकाई से जुड़े मौजूदा आइटम प्रभावित नहीं होंगे।')) return;
  list.splice(idx,1);
  persistUnitConfigs(list);
}
function addNewUnit(){
  const name=val('nu_name');
  if(!name){ toast('इकाई का नाम लिखें',true); return; }
  const list=unitConfigs().slice();
  if(list.some(u=>u.name.toLowerCase()===name.toLowerCase())){ toast('यह इकाई पहले से मौजूद है',true); return; }
  const u={name:name};
  UNIT_DIM_FIELDS.forEach(([f])=>{ const el=document.getElementById('nu_'+f); u[f]=el?el.checked:true; });
  list.push(u);
  persistUnitConfigs(list);
}
function persistUnitConfigs(list){
  loader(true);
  api('saveUnitConfigs', list)
    .then((fresh)=>{ state.data.unitConfigs=fresh||list; refresh(); toast('इकाई सेटिंग सहेजी गई'); })
    .catch(e=>{ loader(false); toast('त्रुटि: '+e,true); });
}
function saveSettingsForm(){
  const keys=['Gst','Cgst','Sgst','LaborCess','IncomeTax','Retention'];
  const upd={};
  keys.forEach(k=>{ upd[k+'On']=document.getElementById('st_'+k+'On').checked; upd[k+'Pct']=val('st_'+k+'Pct'); });
  loader(true);
  api('saveDefaultDeductions', upd)
    .then((fresh)=>{ state.data.defaultDeductions=fresh||upd; refresh(); toast('सेटिंग सहेजी गई — सभी परियोजनाओं में लागू'); })
    .catch(e=>{ loader(false); toast('त्रुटि: '+e, true); });
}

function handleImportFile(input){
  const f=input.files && input.files[0]; if(!f) return;
  if(typeof XLSX==='undefined'){ toast('Excel लाइब्रेरी लोड नहीं हुई',true); return; }
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      buildImport(XLSX.utils.sheet_to_json(ws,{defval:''}));
    }catch(err){ toast('फ़ाइल पढ़ने में त्रुटि: '+err,true); }
  };
  reader.readAsArrayBuffer(f);
}
function buildImport(raw){
  const rows=(raw||[]).map(mapRow).filter(o=>String(o.ItemNo||'').trim()!=='' || String(o.ShortName||'').trim()!=='');
  const map={}, order=[];
  rows.forEach(r=>{
    const key=String(r.ItemNo||'').trim()||String(r.ShortName||'').trim();
    if(!map[key]){ map[key]={item:r, meas:[]}; order.push(key); }
    if(['ChFrom','ChTo','Length','Breadth','Depth','Nos1','Nos2','MeasDesc','Side'].some(f=>String(r[f]||'').trim()!=='')) map[key].meas.push(r);
  });
  const items=[], measurements=[];
  order.forEach(key=>{
    const g=map[key], r=g.item, itemId=uid(); let sancSum=0;
    g.meas.forEach(mr=>{
      let len=round(toNum(mr.Length),4);
      if(!len && String(mr.ChFrom||'').trim()!=='' && String(mr.ChTo||'').trim()!=='') len=round((toNum(mr.ChTo)-toNum(mr.ChFrom))*1000,4);
      const bBlank=String(mr.Breadth||'').trim()==='', dBlank=String(mr.Depth||'').trim()==='';
      const q=calcQty(mr.Nos1,mr.Nos2,(len||''),mr.Breadth,mr.Depth); sancSum+=q;
      measurements.push({ MeasID:uid(), ItemID:itemId, Kind:'sanctioned', SancRef:'', Engineer:String(mr.Engineer||'').trim(), Description:String(mr.MeasDesc||'').trim(),
        ChFrom:String(mr.ChFrom||'').trim(), ChTo:String(mr.ChTo||'').trim(), Side:String(mr.Side||'').trim(),
        MBNo:'', MBPage:'', MDate:'', Nos1:(String(mr.Nos1||'').trim()===''?'':round(toNum(mr.Nos1),4)), Nos2:(String(mr.Nos2||'').trim()===''?'':round(toNum(mr.Nos2),4)),
        Length:(len||''), Breadth:(bBlank?'':round(toNum(mr.Breadth),4)), BreadthExpr:'', Depth:(dBlank?'':round(toNum(mr.Depth),4)), DepthExpr:'',
        Quantity:round(q,4), RecordMB:'', RecordDate:'' });
    });
    items.push({ ItemID:itemId, ItemNo:String(r.ItemNo||'').trim(), Description:String(r.ShortName||'').trim(),
      DetailDesc:String(r.DetailDesc||'').trim(), Unit:String(r.Unit||'').trim(), Rate:round(toNum(r.Rate),4), SanctionedQty:round(sancSum,4) });
  });
  IMPORT.payload={items, measurements};
  const el=document.getElementById('imp_summary');
  if(el){
    if(!items.length){ el.innerHTML='⚠ कोई मान्य पंक्ति नहीं मिली — कॉलम-शीर्षक जाँचें।'; document.getElementById('imp_run').disabled=true; }
    else { el.innerHTML=`<b>${items.length}</b> आइटम व <b>${measurements.length}</b> निर्धारित नाप पंक्तियाँ मिलीं। "आयात करें" दबाएँ।`; document.getElementById('imp_run').disabled=false; }
  }
}

  // आयातित अभियंताओं को परियोजना सूची में जोड़ें (ताकि फ़िल्टर में दिखें)

/* संख्या या सरल औसत/अंकगणित expression — जैसे "(2.00+1.00)/2" — को मान में बदलें */
function evalNum(v){
  const s=String(v==null?'':v).trim();
  if(s==='') return null;
  if(/^-?\d*\.?\d+$/.test(s)) return parseFloat(s);
  if(/^[0-9+\-*/().\s]+$/.test(s)){
    try{ const r=Function('"use strict";return ('+s+')')(); return (typeof r==='number'&&isFinite(r))?r:null; }catch(e){ return null; }
  }
  return null;
}
/* expression हो (सादा संख्या नहीं) तो वही लौटाएँ, अन्यथा '' */
function exprIfAny(v){ const s=String(v==null?'':v).trim(); if(s==='') return ''; return /^-?\d*\.?\d+$/.test(s)?'':s; }
function calcQty(){
  const arr=Array.prototype.slice.call(arguments).map(v=> evalNum(v));
  if(arr.every(v=>v===null)) return 0;
  return round(arr.reduce((p,v)=>p*(v===null?1:v),1),3);
}
function recalcMeas(){
  const q=calcQty(val('mf_n1'),val('mf_n2'),val('mf_l'),val('mf_b'),val('mf_d'));
  document.getElementById('mf_qty').textContent=qf(q);
}

  if(kind==='sanctioned'){
    // निर्धारित घटाकर पहले से नापी गई से कम न हो
    if(id){ const measured=sancMeasuredQty(id); if(measured>0.0005 && q < measured-0.0005){ toast('निर्धारित मात्रा ('+qf(q)+') इसके सापेक्ष पहले से नापी गई ('+qf(measured)+') से कम नहीं हो सकती',true); return; } }
  } else {
    sancRef=val('mf_sancref');
    const hasSanc = sancMeasOfItem(itemId).length>0;
    if(hasSanc && !sancRef){ toast('संबंधित निर्धारित नाप चुनें (किसके सापेक्ष)',true); return; }
    if(id){
      // भुगतान हो चुकी नाप पूरी तरह लॉक — निगेटिव मात्रा वाला भुगतान भी (इसलिए Math.abs), नाप builder जैसा ही व्यवहार
      const paid=measPaid(id); if(Math.abs(paid)>0.0005){ toast('इस नाप का भुगतान ('+qf(paid)+') हो चुका है — अब इसमें बदलाव नहीं किया जा सकता',true); return; }
    }
  }
  // अधिक नाप (निर्धारित नाप के शेष से ज्यादा) — सिर्फ़ चेतावनी, सेव को रोकें नहीं; जो वास्तव में नापा गया है उसी का भुगतान बनना चाहिए
  if(kind!=='sanctioned' && sancRef){
    const parent=sancById(sancRef);
    if(parent){
      const rem=sancRemainQty(parent, id);
      if(q > rem+0.0005){
        confirmModal('⚠️ अधिक नाप — चेतावनी',
          'यह नाप ('+qf(q)+') निर्धारित नाप के शेष ('+qf(rem)+') से अधिक है। स्थिति में "अधिक नाप" दर्ज होगी, और बाद में चाहें तो निर्धारित नाप भी बढ़ा सकते हैं। क्या फिर भी सहेजें?',
          ()=>_saveMeasModalDo(id,itemId,kind,sancRef,q), 'हाँ, सहेजें');
        return;
      }
    }
  }
  _saveMeasModalDo(id,itemId,kind,sancRef,q);
}
function _saveMeasModalDo(id,itemId,kind,sancRef,q){
  const prevM = id? D().measurements.find(x=>String(x.MeasID)===String(id)) : null;
  const m={ MeasID:id||'', ItemID:itemId, Kind:kind, SancRef:sancRef, Engineer:(kind==='sanctioned'?val('mf_eng'):''),
    Ord:(prevM&&prevM.Ord!=null?prevM.Ord:''),
    Description:val('mf_desc'), ChFrom:val('mf_chf'), ChTo:val('mf_cht'), Side:val('mf_side'),
    MBNo:val('mf_mb'), MBPage:val('mf_pg'), MDate:val('mf_date'), RecordMB:val('mf_rmb'), RecordDate:val('mf_rdate'),
    Nos1:(document.getElementById('mf_n1')?numVal('mf_n1'):''), Nos2:(document.getElementById('mf_n2')?numVal('mf_n2'):''), Length:(document.getElementById('mf_l')?numVal('mf_l'):''),
    Breadth:(document.getElementById('mf_b')?numVal('mf_b'):''), Depth:(document.getElementById('mf_d')?numVal('mf_d'):''), Quantity:q };
  loader(true); api('saveMeasurement',m).then((newId)=>{
    m.MeasID = id || newId;
    upsertLocal(state.data.measurements, 'MeasID', m);
    closeModal(); render(); loader(false);
    toast('नाप सहेजी गई '+(IS_GAS?'(स्प्रेडशीट)':'(लोकल — सिंक नहीं)'));
  }).catch(e=>{loader(false);toast('त्रुटि: '+e,true);});
}
function delMeas(id){
  const m=D().measurements.find(x=>String(x.MeasID)===String(id));
  if(m && isSanc(m)){
    if(actualOfSanc(id).length){ toast('पहले इसके सापेक्ष की गई साइट-नापें हटाएँ',true); return; }
  } else if(Math.abs(measPaid(id))>0.0005){ toast('इस नाप का भुगतान हो चुका है — पहले संबंधित बिल हटाएँ',true); return; }
  confirmModal('नाप हटाएँ?', `"${esc(m.Description||'नाप')}" हटाई जाएगी।`, ()=>{
    loader(true); api('deleteMeasurement',id).then(()=>{
      state.data.measurements = state.data.measurements.filter(x=>String(x.MeasID)!==String(id));
      render(); loader(false); toast('हटाया गया');
    }).catch(e=>{loader(false);toast('त्रुटि: '+e,true);});
  });
}

/* निर्धारित नाप का विवरण — इसके सापेक्ष कौन-सी साइट-नाप व भुगतान, कितना बाकी */
function sancDetail(id){
  const s=D().measurements.find(x=>String(x.MeasID)===String(id) && isSanc(x));
  if(!s){ toast('निर्धारित नाप नहीं मिली',true); return; }
  const it=itemById(s.ItemID)||{}; const unit=esc(it.Unit||'');
  const linked=actualOfSanc(id);
  const nirdharit=measQty(s), measured=sancMeasuredQty(id), remMeas=round(nirdharit-measured,3);

  // बिल अनुसार भुगतान (सभी संबंधित साइट-नापों के पार)
  let paidQty=0, paidAmt=0; const billMap={};
  linked.forEach(function(m){
    detailsOf('MeasID',m.MeasID).forEach(function(d){
      paidQty+=toNum(d.Qty); paidAmt+=toNum(d.Amount);
      if(!billMap[d.PayID]) billMap[d.PayID]={qty:0,amt:0};
      billMap[d.PayID].qty+=toNum(d.Qty); billMap[d.PayID].amt+=toNum(d.Amount);
    });
  });
  paidQty=round(paidQty,3); paidAmt=round(paidAmt,2);
  const remPay=round(measured-paidQty,3);

  const measRows = linked.map(function(m){
    const tot=measQty(m), paid=measPaid(m.MeasID), rem=round(tot-paid,3);
    const st = rem<=0.0005?'<span class="badge b-green">पूर्ण भुगतान</span>':(paid>0?'<span class="badge b-amber">आंशिक</span>':'<span class="badge b-grey">शेष</span>');
    return `<tr>
      <td><b>${esc(measName(m))}</b><div class="faint">${esc(m.MBNo||'')}${m.MBPage?(' / पृ.'+esc(m.MBPage)):''} · ${dmy(m.MDate)}</div></td>
      <td class="r num">${qf(tot)}</td>
      <td class="r num" style="color:var(--green)">${qf(paid)}</td>
      <td class="r num" style="color:var(--red-2)">${qf(rem)}</td>
      <td class="c">${st}</td></tr>`;
  }).join('') || `<tr><td colspan="5" class="muted" style="text-align:center;padding:14px">इसके सापेक्ष अभी कोई साइट-नाप नहीं</td></tr>`;

  const billRows = Object.keys(billMap).map(function(pid){
    const p=D().payments.find(x=>String(x.PayID)===String(pid))||{}; const b=billMap[pid];
    return `<tr>
      <td><b>${esc(p.BillNo||'—')}</b> <span class="badge ${p.BillType==='अंतिम'?'b-blue':'b-grey'}" style="font-size:10px">${esc(p.BillType||'चालू')}</span></td>
      <td class="muted">${dmy(p.PDate)}</td><td class="muted">${esc(p.MBNo||'—')}</td>
      <td class="r num">${qf(round(b.qty,3))}</td>
      <td class="r num" style="color:var(--green)">${inr(round(b.amt,2))}</td></tr>`;
  }).join('') || `<tr><td colspan="5" class="muted" style="text-align:center;padding:14px">अभी कोई भुगतान नहीं</td></tr>`;

  const body=`<dl class="kv">
    <dt>आइटम</dt><dd style="font-family:var(--ui)">${esc(it.Description||'')}</dd>
    <dt>निर्धारित नाप</dt><dd style="font-family:var(--ui)">${esc(measName(s))}</dd>
    <dt>निर्धारित मात्रा</dt><dd>${qf(nirdharit)} ${unit}</dd>
    <dt>नापी गई (साइट)</dt><dd style="color:var(--accent)">${qf(measured)}</dd>
    <dt>शेष नाप</dt><dd style="color:var(--red-2)">${qf(remMeas)}</dd>
    <dt>भुगतान हुआ</dt><dd style="color:var(--green)">${qf(paidQty)} · ${inr(paidAmt)}</dd>
    <dt>शेष भुगतान (नापी पर)</dt><dd style="color:var(--red-2)">${qf(remPay)}</dd></dl>
  <div class="section-head" style="margin:6px 2px 8px"><h2 style="font-size:14px">इसके सापेक्ष साइट-नाप</h2></div>
  <div class="tbl-wrap" style="border:1px solid var(--line);border-radius:10px;margin-bottom:14px"><table>
    <thead><tr><th>नाप (MB / तारीख)</th><th class="r">मात्रा</th><th class="r">भुगतान</th><th class="r">शेष</th><th class="c">स्थिति</th></tr></thead>
    <tbody>${measRows}</tbody></table></div>
  <div class="section-head" style="margin:6px 2px 8px"><h2 style="font-size:14px">भुगतान (बिल अनुसार)</h2></div>
  <div class="tbl-wrap" style="border:1px solid var(--line);border-radius:10px"><table>
    <thead><tr><th>बिल</th><th>तारीख</th><th>MB</th><th class="r">मात्रा</th><th class="r">राशि</th></tr></thead>
    <tbody>${billRows}</tbody></table></div>`;
  openModal('निर्धारित नाप — विवरण', body,
    `<button class="btn btn-ghost" onclick="closeModal()">बंद करें</button>
     <button class="btn btn-primary" onclick='openMeasBuilder(${JSON.stringify(id)})'><span class="ic">✎</span> नाप जोड़ें / पूरी करें</button>`, true);
}

/* ===================================================================
   नाप builder — निर्धारित नाप के सापेक्ष इनलाइन (पंक्ति-दर-पंक्ति) नाप
=================================================================== */
let MB = { mode:'actual', sancId:null, itemId:null, dims:{B:true,D:true}, deletes:[] };
/* dims के अनुसार कॉलम-हेडर (चौ/ऊँ छोड़े जा सकते हैं) */
function mbCols(){
  const d=MB.dims||{L:true,B:true,D:true};
  let th=`<th>चै. से</th><th>चै. तक</th><th>पक्ष</th><th>विवरण</th>`;
  if(d.N1!==false) th+=`<th>नग1</th>`;
  if(d.N2!==false) th+=`<th>नग2</th>`;
  if(d.L!==false) th+=`<th>लं</th>`;
  if(d.B) th+=`<th>चौ</th>`;
  if(d.D) th+=`<th>ऊँ</th>`;
  if(MB.mode==='sanctioned') th+=`<th>अभियंता</th>`;
  else th+=`<th>MB</th><th>पृ.</th><th>दिनांक</th>`;
  th+=`<th class="r">मात्रा</th>`;
  return th;
}

/* वास्तविक (साइट) नाप — किसी निर्धारित नाप के सापेक्ष, टुकड़ों में */
function openMeasBuilder(sancId){
  const s=sancById(sancId);
  if(!s){ toast('निर्धारित नाप नहीं मिली',true); return; }
  const it=itemById(s.ItemID)||{};
  MB={ mode:'actual', sancId:sancId, itemId:s.ItemID, dims:itemDims(it), deletes:[] };
  const linked=actualOfSanc(sancId);

  // सबसे ऊपर — निर्धारित नाप का पूरा linear विवरण, एक संदर्भ row के रूप में
  const ref=`<div class="section-head" style="margin:0 2px 6px"><h2 style="font-size:14px">निर्धारित नाप (संदर्भ)</h2>
      <span class="sub">${esc(it.ItemNo||'')} · ${esc(it.Description||'')} — इकाई ${esc(it.Unit||'')}</span>
      <div class="spacer"></div>
      <span class="calc-box" style="margin:0;padding:8px 12px">निर्धारित <b>${nf2(measQty(s))}</b> &nbsp;·&nbsp; शेष नाप <b id="mb_live">0</b></span></div>
    <div class="tbl-wrap" style="border:2px solid var(--ink-2);border-radius:10px;margin-bottom:14px"><table class="mb-grid">
      <thead><tr>${mbCols()}<th></th></tr></thead>
      <tbody><tr style="background:var(--blue-bg);font-weight:600">${sancRefCells(s)}<td></td></tr></tbody></table></div>`;

  const rows = (linked.length?linked:[{}]).map(builderRow).join('');
  const grid=`<div class="section-head" style="margin:0 2px 6px"><h2 style="font-size:14px">साइट पर की गई नाप (इसी निर्धारित के सापेक्ष, टुकड़ों में)</h2></div>
    <div class="tbl-wrap" style="border:1px solid var(--line);border-radius:10px;max-height:52vh;overflow:auto"><table class="mb-grid">
    <thead><tr>${mbCols()}<th></th></tr></thead>
    <tbody id="mbBody">${rows}</tbody></table></div>
    <div style="display:flex;gap:8px;margin-top:10px"><button class="btn btn-ghost btn-sm" onclick="mbAddRow()"><span class="ic">＋</span> पंक्ति जोड़ें</button><button class="btn btn-ghost btn-sm" onclick="mbCopyRow()"><span class="ic">⧉</span> कॉपी पंक्ति</button></div>
    <div class="mb-warn" id="mb_warn"></div>
    <div class="pb-total"><span class="lbl">इस निर्धारित के सापेक्ष कुल नापी मात्रा</span><span class="amt" id="mb_total">0</span></div>`;

  openModal('नाप builder — '+measName(s), ref+grid,
    `<button class="btn btn-ghost" onclick="closeModal()">रद्द</button>
     <button class="btn btn-primary" onclick="mbSave()"><span class="ic">✓</span> सभी सहेजें</button>`, 'full');
  document.getElementById('mbBody').addEventListener('input', mbOnInput);
  mbRecalc();
}

/* निर्धारित नाप — आइटम (BOQ) के लिए, linear (पंक्ति-दर-पंक्ति) फीडिंग */
function openSancBuilder(itemId){
  const it=itemById(itemId);
  if(!it){ toast('आइटम नहीं मिला',true); return; }
  MB={ mode:'sanctioned', sancId:null, itemId:itemId, dims:itemDims(it), deletes:[] };

  const ref=`<div class="section-head" style="margin:0 2px 8px"><h2 style="font-size:14px">आइटम (BOQ) — संदर्भ</h2>
      <span class="sub">${esc(it.ItemNo||'')} · ${esc(it.Description||'')} — इकाई ${esc(it.Unit||'')} · दर ₹${nf2(itemRate(it))}</span>
      <div class="spacer"></div>
      <span class="calc-box" style="margin:0;padding:8px 12px">स्वीकृत मात्रा (योग) <b id="mb_live">0</b> ${esc(it.Unit||'')}</span></div>
    <div class="faint" style="margin:0 2px 10px">नीचे जो निर्धारित नाप भरेंगे, उनका योग ही इस आइटम की BOQ स्वीकृत मात्रा बनेगा।</div>`;

  const rows = (existing.length?existing:[{}]).map(builderRow).join('');
  const grid=`<div class="section-head" style="margin:0 2px 6px"><h2 style="font-size:14px">निर्धारित नाप (स्वीकृति के अनुसार)</h2></div>
    <div class="tbl-wrap" style="border:1px solid var(--line);border-radius:10px;max-height:58vh;overflow:auto"><table class="mb-grid">
    <thead><tr>${mbCols()}<th></th></tr></thead>
    <tbody id="mbBody">${rows}</tbody></table></div>
    <div style="display:flex;gap:8px;margin-top:10px"><button class="btn btn-ghost btn-sm" onclick="mbAddRow()"><span class="ic">＋</span> पंक्ति जोड़ें</button><button class="btn btn-ghost btn-sm" onclick="mbCopyRow()"><span class="ic">⧉</span> कॉपी पंक्ति</button></div>
    <div class="mb-warn" id="mb_warn"></div>
    <div class="pb-total"><span class="lbl">स्वीकृत मात्रा (योग) → BOQ में</span><span class="amt" id="mb_total">0</span></div>`;

  openModal('निर्धारित नाप builder — '+(it.Description||''), ref+grid,
    `<button class="btn btn-ghost" onclick="closeModal()">रद्द</button>
     <button class="btn btn-primary" onclick="mbSave()"><span class="ic">✓</span> सभी सहेजें</button>`, 'full');
  document.getElementById('mbBody').addEventListener('input', mbOnInput);
  mbRecalc();
}
function sancRefCells(s){
  const c=(v)=>`<td>${esc((v!=null&&String(v).trim()!=='')?v:'—')}</td>`;
  const num=(v)=>{ const x=(v!=null&&String(v).trim()!=='')?nf2(v):'—'; return `<td class="r num">${x}</td>`; };
  const dn=(v,e)=> (e&&String(e).trim()!=='')?`<td class="r num" style="font-family:var(--mono)">${esc(e)}</td>`:num(v);
  const d=MB.dims||{L:true,B:true,D:true};
  return c(s.ChFrom)+c(s.ChTo)+c(sideLabel(s))+c(s.Description)
    +(d.N1===false?'':num(nos1Of(s)))+(d.N2===false?'':num(s.Nos2))+(d.L===false?'':num(s.Length))
    +(d.B===false?'':dn(s.Breadth,s.BreadthExpr))+(d.D===false?'':dn(s.Depth,s.DepthExpr))
    +c(s.MBNo)+c(s.MBPage)+`<td>${s.MDate?dmy(s.MDate):'—'}</td>`
    +`<td class="r num"><b>${nf2(measQty(s))}</b></td>`;
}
function builderRow(m){
  m=m||{};
  const id=m.MeasID||'', n1=nos1Of(m);
  // floor = वह न्यूनतम जिससे कम मात्रा नहीं हो सकती, और >0 हो तो पंक्ति हटाई नहीं जा सकती
  const floor = id ? (MB.mode==='sanctioned' ? sancMeasuredQty(id) : measPaid(id)) : 0;
  // जिस (साइट/वास्तविक) नाप का भुगतान हो चुका है — उसकी पूरी पंक्ति संपादन के लिए डिसेबल (निगेटिव मात्रा वाला भुगतान भी, इसलिए Math.abs)
  const paidLock = !!(id && MB.mode!=='sanctioned' && Math.abs(floor)>0.0005);
  const lockTitle = paidLock ? ('इस नाप का भुगतान ('+qf(floor)+') हो चुका है — संपादन डिसेबल')
    : (MB.mode==='sanctioned' ? ('इसके सापेक्ष नाप '+qf(floor)+' — हटाया नहीं जा सकता') : ('भुगतान '+qf(floor)+' — हटाया नहीं जा सकता'));
  const dis = paidLock ? 'disabled' : '';
  const sideOpts=['','बायाँ','दायाँ','मध्य'].map(x=>`<option ${String(m.Side||'')===x?'selected':''}>${x||'—'}</option>`).join('');
  const v=(x)=> (x!=null&&String(x).trim()!=='')?esc(x):'';
  return `<tr data-meas="${esc(id)}" data-paid="${floor}" ${paidLock?'data-paidlock="1"':''}>
    <td><input class="mb-in" style="width:64px" data-f="ChFrom" value="${v(m.ChFrom)}" placeholder="से" ${dis}></td>

/* चौड़ाई/ऊँचाई सेल — संख्या या औसत expression "(a+b)/2"; बायीं ओर औसत-भरने का बटन */

function mbAvgStart(btn){

  td.dataset.field=field; td.dataset.orig=cur;

function mbFieldNum(tr,f){ return evalNum(mbRowVal(tr,f)); }
function mbForceStart(btn){
  const tr=btn.closest('tr'); tr.dataset.forcing='1';
  const cur=mbRowQty(tr);
  const lOpt=(MB.dims&&MB.dims.L===false)?'':'<option value="Length">लंबाई</option>';

    <select class="mb-in" data-qadjust style="width:74px" onchange="mbForceApply(this)"><option value="">बदलें…</option>${lOpt}${bOpt}</select>
    <button type="button" class="icon-btn" title="रद्द" onclick="mbForceCancel(this)">✕</button>`;
  const inp=tr.querySelector('[data-qforce]'); if(inp) inp.focus();
}
function mbForceApply(sel){
  const tr=sel.closest('tr'); const dim=sel.value; if(!dim) return;
  const Q=round(toNum(tr.querySelector('[data-qforce]').value),3);   // byforce मात्रा — अधिकतम 3 दशमलव
  if(Q===0){ toast('पहले byforce मात्रा भरें',true); sel.value=''; return; }
  const others=['Nos1','Nos2','Depth', dim==='Length'?'Breadth':'Length'];
  let prod=1; others.forEach(f=>{ const n=mbFieldNum(tr,f); if(n!=null) prod*=n; });
  if(Math.abs(prod)<1e-9){ toast('अन्य मानों के कारण गणना संभव नहीं — पहले नग/गहराई/अन्य भरें',true); return; }
  const dimVal=round(Q/prod,9);    // विमा को पूरी परिशुद्धता से, ताकि मात्रा ठीक Q बने रहे (3 दशमलव)
  const el=tr.querySelector('[data-f="'+dim+'"]'); el.value=dimVal; if(dim==='Length') el.dataset.manual='1';
  delete tr.dataset.forcing; mbRestoreQcell(tr); mbRecalc();
  toast((dim==='Length'?'लंबाई':'चौड़ाई')+' '+dimVal+' सेट — मात्रा '+qf(Q));
}
function mbForceCancel(btn){ const tr=btn.closest('tr'); delete tr.dataset.forcing; mbRestoreQcell(tr); mbRecalc(); }
function mbRestoreQcell(tr){ tr.querySelector('[data-qcell]').innerHTML=mbQcellHTML(); }
function mbRecalc(){
  let total=0;
  mbRows().forEach(function(tr){
    const q=mbRowQty(tr); total+=q;
    if(tr.dataset.forcing==='1') return;                 // byforce संपादन के दौरान सेल न छेड़ें
    const qv=tr.querySelector('[data-qval]'); if(qv) qv.innerHTML='<b>'+nf2(q)+'</b>';
  });
  total=round(total,3);
  document.getElementById('mb_total').textContent=nf2(total);
  // चैनेज overlap चेतावनी (live)
  const warnEl=document.getElementById('mb_warn');
  if(warnEl){
    const w=chOverlapWarn(mbRows().map(tr=>({Side:mbRowVal(tr,'Side'),ChFrom:mbRowVal(tr,'ChFrom'),ChTo:mbRowVal(tr,'ChTo')})));
    warnEl.style.display = w.length?'block':'none';
    warnEl.innerHTML = w.length ? ('⚠ चैनेज overlap: '+w.map(esc).join(' · ')) : '';
  }
  const liveEl=document.getElementById('mb_live'); if(!liveEl) return;
  if(MB.mode==='sanctioned'){
    liveEl.textContent=nf2(total);   // स्वीकृत मात्रा (योग) — यही BOQ में जाती है
    liveEl.style.color='';
  } else {
    const s=sancById(MB.sancId); const nirdharit=s?measQty(s):0; const rem=round(nirdharit-total,3);
    liveEl.textContent=nf2(rem);
    liveEl.style.color = rem<-0.0005 ? 'var(--red-2)' : (rem<=0.0005 ? 'var(--green)' : '');
  }
}
function mbAddRow(){

function mbCopyRow(){
  const rows=mbRows();
  if(!rows.length){ toast('कॉपी के लिए कोई पंक्ति नहीं है',true); return; }
  const src=rows[rows.length-1];

function mbSave(){
  const isSancMode = MB.mode==='sanctioned';
  const s = isSancMode ? null : sancById(MB.sancId);
  if(!isSancMode && !s){ toast('निर्धारित नाप नहीं मिली',true); return; }
  const itemId = isSancMode ? MB.itemId : s.ItemID;
  const saves=[]; let total=0, err='';
  mbRows().forEach(function(tr){
    const id=tr.dataset.meas, floor=toNum(tr.dataset.paid);
    if(id && tr.dataset.paidlock==='1') return; // भुगतान हो चुकी नाप — DOM से छेड़छाड़ हो भी जाए तो भी अनदेखा करें, मूल मान सुरक्षित रहे
    const q=mbRowQty(tr);
    if(q===0){ if(id) err=err||'किसी पंक्ति की मात्रा शून्य है — भरें या पंक्ति हटाएँ'; return; } // खाली/शून्य पंक्ति → छोड़ें (ऋणात्मक=कटौती मान्य)
    if(id && floor>0.0005 && q<floor-0.0005){ err=err||(isSancMode
        ? ('एक निर्धारित पंक्ति की मात्रा ('+qf(q)+') इसके सापेक्ष नापी गई ('+qf(floor)+') से कम नहीं हो सकती')
        : ('एक पंक्ति की मात्रा ('+qf(q)+') उसके भुगतान ('+qf(floor)+') से कम नहीं हो सकती')); return; }
    total+=q;
    const bRaw=mbRowVal(tr,'Breadth'), dRaw=mbRowVal(tr,'Depth'), lRaw=mbRowVal(tr,'Length'), n1Raw=mbRowVal(tr,'Nos1'), n2Raw=mbRowVal(tr,'Nos2');
    const bNum=evalNum(bRaw), dNum=evalNum(dRaw);
    const row={ MeasID:id||'', ItemID:itemId, Kind:(isSancMode?'sanctioned':'actual'),
      ChFrom:mbRowVal(tr,'ChFrom'), ChTo:mbRowVal(tr,'ChTo'), Side:mbRowVal(tr,'Side'), Description:mbRowVal(tr,'Description'),
      MBNo:mbRowVal(tr,'MBNo'), MBPage:mbRowVal(tr,'MBPage'), MDate:mbRowVal(tr,'MDate'),
      Nos1:(String(n1Raw).trim()===''?'':toNum(n1Raw)), Nos2:(String(n2Raw).trim()===''?'':toNum(n2Raw)), Length:(String(lRaw).trim()===''?'':toNum(lRaw)),
      Breadth:(bNum==null?'':bNum), BreadthExpr:exprIfAny(bRaw), Depth:(dNum==null?'':dNum), DepthExpr:exprIfAny(dRaw), Quantity:q };
    if(isSancMode) row.Engineer=mbRowVal(tr,'Engineer'); else row.SancRef=MB.sancId;
    if(id){ const pv=D().measurements.find(x=>String(x.MeasID)===String(id)); if(pv && pv.Ord!=null && String(pv.Ord)!=='') row.Ord=pv.Ord; }  // मैनुअल क्रम बनाए रखें
    saves.push(row);
  });
  if(err){ toast(err,true); return; }
  if(!isSancMode){ const nirdharit=measQty(s); if(round(total,3) > round(nirdharit,3)+0.0005){
    confirmModal('⚠️ अधिक नाप — चेतावनी 1',
      'कुल नापी मात्रा ('+qf(round(total,3))+') निर्धारित ('+qf(nirdharit)+') से अधिक है। क्या आप फिर भी सहेजना चाहते हैं?',
      function(){
        confirmModal('⚠️ अधिक नाप — पुनः पुष्टि',
          'यह नाप निर्धारित से अधिक है और स्थिति में "अधिक नाप" दर्ज होगी। क्या आप निश्चित हैं?',
          function(){ _doMbSave(saves); }, 'हाँ, सहेजें');
      }, 'हाँ, जारी रखें'); return; } }
  _doMbSave(saves);
}
function _doMbSave(saves){
  if(!saves.length && !MB.deletes.length){ toast('कोई बदलाव नहीं',true); return; }
  loader(true);
  api('saveMeasurementsBatch', {saves:saves, deletes:MB.deletes}).then((ids)=>{
    const dels=MB.deletes;
    state.data.measurements = state.data.measurements.filter(x=>dels.indexOf(x.MeasID)===-1);
    saves.forEach((m,i)=>{ if(!m.MeasID) m.MeasID=ids[i]; upsertLocal(state.data.measurements,'MeasID',m); });
    closeModal(); render(); loader(false);
    toast('नाप सहेजी गई '+(IS_GAS?'(स्प्रेडशीट)':'(लोकल — सिंक नहीं)'));
  }).catch(e=>{ loader(false); toast('त्रुटि: '+e, true); });
}
