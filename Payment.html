  <div class="pb-head" style="margin-bottom:16px">
    <div class="field f-mb"><label>MB संख्या</label><input id="pb_mb" class="inp" value="${esc(p.MBNo||'')}" placeholder="MB-21"></div>
    <div class="field f-pg"><label>MB पृष्ठ</label><input id="pb_pg" class="inp" value="${esc(p.MBPages||'')}" placeholder="12-14"></div>
    <div class="field f-rem"><label>टिप्पणी</label><input id="pb_rem" class="inp" value="${esc(p.Remarks||'')}" placeholder="जैसे प्रथम चालू बिल"></div>
  </div>
  <div id="pb_finalBlk" class="pb-head" style="margin-bottom:16px;display:${p.BillType==='अंतिम'?'':'none'}">
    <div class="field f-date"><label>कार्य की वास्तविक समाप्ति की तिथि</label><input id="pb_actualEnd" class="inp" type="date" value="${esc((p.ActualEndDate||todayISO()).slice(0,10))}"></div>
  </div>`;

  // measurement selector grouped by item — हर नाप-लाइन की पंक्ति (डीटेल, संपादन योग्य) + हर आइटम की एक संयुक्त पंक्ति (एकसाथ, सिर्फ़ देखने हेतु — पढ़ने योग्य, संपादन नहीं);
  // "एकसाथ/डीटेल" बटन सिर्फ़ दिखाना/छुपाना बदलता है — मात्रा हमेशा डीटेल की नाप-लाइन इनपुट से ही बदली जाती है, "एकसाथ" व डीटेल का "इस बिल में अब तक" बैज दोनों उससे लाइव अपडेट होते हैं (देखें pbRecalc)
  let blocks=''; let combinedBlocks=''; let anyRow=false;
  items().forEach(function(it){
    const ms=actualMeasOfItem(it.ItemID);
    let measQtySum=0, defSum=0, maxSum=0, lineCount=0;
    const rows=ms.map(function(m){
      const rem = measRemain(m, editId);       // remaining excluding this bill
      const cur = existing[m.MeasID]||0;        // this bill's current qty
      const def = editId ? cur : round(rem,3);  // default = remaining (new) or current (edit)
      const maxV= round(rem,3);
      if(Math.abs(rem)<0.0005 && !cur) return ''; // fully paid elsewhere, skip
      anyRow=true; lineCount++;
      measQtySum += measQty(m);
      defSum += def;
      maxSum += maxV; // ऋणात्मक-शेष (अधिक-नाप समायोजन) वाली लाइनें भी जोड़ें — वरना "एकसाथ" का शेष-योग कुल-योग से मेल नहीं खाता
      return `<tr class="pb-line-row" data-meas="${esc(m.MeasID)}" data-item="${esc(it.ItemID)}" data-rate="${itemRate(it)}" data-max="${maxV}">
        <td><b>${esc(measName(m))}</b><div class="faint">${esc(m.MBNo||'')}${m.MBPage?(' / पृ.'+esc(m.MBPage)):''}</div></td>
        <td class="r num faint">${qf(measQty(m))}</td>
        <td class="r num remain-tag" style="color:var(--red-2)">${qf(maxV)}</td>
        <td class="r num faint">${inr(itemRate(it))}</td>
        <td class="r"><div class="pb-qty-cell">
          <input class="pb-input num" type="number" step="any" value="${def?def:''}" oninput="pbRecalc()" ${qtyLocked?'disabled title="नया बिल बन चुका है — मात्रा संपादन डिसेबल"':''}>
          <button type="button" class="pb-fill-toggle ${Math.abs(def-maxV)<0.0005&&Math.abs(maxV)>0.0005?'full':''}" onclick="pbToggleLineFill(this)" ${qtyLocked?'disabled':''} title="क्लिक: पूरी शेष मात्रा भरें / खाली करें">✓</button>
        </div></td>
        <td class="r num" data-amt>${inr(round(def*itemRate(it),2))}</td>
      </tr>`;
    }).join('');
    if(rows){
      const defSumR=round(defSum,3);
      blocks+=`<tr class="grp-row"><td colspan="6"><span class="item-no">${esc(it.ItemNo)}</span> &nbsp; ${esc(it.Description)} <span class="faint" style="font-weight:500">— दर ${inr(itemRate(it))}/${esc(it.Unit||'')}</span>
        <label class="pb-item-exclude" title="इस आइटम की सभी मात्रा इस बिल से हटाएं"><input type="checkbox" onchange="pbToggleItemExclude(this,'${esc(it.ItemID)}')" ${qtyLocked?'disabled':''}>🚫 बाहर रखें</label>
        <span class="pb-item-live" data-itemlive="${esc(it.ItemID)}" style="float:right">इस बिल में अब तक: <b data-qty>${qf(defSumR)}</b> &nbsp;=&nbsp; <b data-amt>${inr(round(defSumR*itemRate(it),2))}</b></span></td></tr>`+rows;
      combinedBlocks+=`<tr class="pb-combined-row" data-itemtotal="${esc(it.ItemID)}" data-rate="${itemRate(it)}" data-max="${round(maxSum,3)}" style="display:none;background:var(--surface-2)">
        <td><span class="item-no">${esc(it.ItemNo)}</span> &nbsp; <b>${esc(it.Description)}</b><div class="faint">${lineCount} नाप-लाइन${lineCount>1?'ें':''}</div></td>
        <td class="r num faint">${qf(measQtySum)}</td>
        <td class="r num remain-tag" style="color:var(--red-2)">${qf(maxSum)}</td>
        <td class="r num faint">${inr(itemRate(it))}</td>
        <td class="r num" data-qty><b>${qf(defSumR)}</b></td>
        <td class="r num" data-amt>${inr(round(defSumR*itemRate(it),2))}</td>
      </tr>`;
    }
  });
  if(!anyRow) blocks=`<tr><td colspan="6" class="muted" style="text-align:center;padding:20px">सभी नापों का भुगतान हो चुका है। नई नाप जोड़ें या मौजूदा बिल संपादित करें।</td></tr>`;

  // सांविधिक % आइटम (GST/Labour Cess/Income Tax/Retention/CGST/SGST) — संपादन में इस बिल से, अन्यथा आख़िरी बने बिल से डिफ़ॉल्ट
  const statSrc = editId ? p : settingsDefaults();
  PB.deductions = editId ? adjOf(editId,'deduction').map(a=>({note:a.Note, amount:toNum(a.Amount)})) : [];
  PB.advances   = editId ? adjOf(editId,'advance').map(a=>({note:a.Note, amount:toNum(a.Amount)})) : [];

  // ठेकेदार को अब तक (इस बिल से पहले के सभी बिलों में) किया गया कुल Advance व Withheld — Adjust करने में मदद हेतु
  let priorAdvance=0, priorWithheld=0;
  D().payments.forEach(x=>{ if(editId && String(x.PayID)===String(editId)) return; priorAdvance+=toNum(x.AdvanceTotal); priorWithheld+=toNum(x.WithheldAmt); });
  PB.priorAdvance = priorAdvance; PB.priorWithheld = priorWithheld;

  // % आधारित गणना के बजाय राशि सीधे टाइप करने का विकल्प — checkbox चेक होने पर % छुप जाता है, राशि इनपुट दिखता है
  const manualBlk=(key,manual,manualAmt)=>`
      <label for="pb_${key}Manual" style="flex:none;display:flex;align-items:center;gap:3px;font-size:11px;color:var(--text3);cursor:pointer;margin:0">
        <input type="checkbox" id="pb_${key}Manual" ${manual?'checked':''} onchange="pbToggleManual('${key}')">मैनुअल</label>
      <input class="inp num pct-inp" id="pb_${key}ManualAmt" type="number" step="any" style="width:140px;${manual?'':'display:none'}" value="${esc(manualAmt||'')}" placeholder="₹ राशि" oninput="pbRecalc()">`;
  const statRow=(key,tlbl,label,ic,on,pct,manual,manualAmt)=>`<div class="pb-stat-row">
      <input type="checkbox" id="pb_${key}On" ${on?'checked':''} onchange="pbRecalc()">
      <label for="pb_${key}On"><span class="faint">${ic} ${tlbl} ·</span> ${label}</label>
      ${manualBlk(key,manual,manualAmt)}
      <input class="inp num pct-inp" id="pb_${key}Pct" type="number" step="any" style="${manual?'display:none':''}" value="${esc(pct||'')}" placeholder="%" oninput="pbRecalc()">
      <span class="amt" id="pb_${key}Amt">₹0</span>
    </div>`;

  const table=`<div style="display:flex;gap:8px;margin-bottom:8px">
    <button class="btn btn-ghost btn-sm" onclick="pbFillAll()" ${qtyLocked?'disabled style="opacity:.4;cursor:not-allowed"':''}>सभी शेष भरें</button>
    <button class="btn btn-ghost btn-sm" onclick="pbClearAll()" ${qtyLocked?'disabled style="opacity:.4;cursor:not-allowed"':''}>सभी खाली करें</button>
    <button class="btn btn-ghost btn-sm" id="pb_modeBtn" onclick="pbToggleViewMode()" title="एकसाथ = हर आइटम की एक कुल पंक्ति (सिर्फ़ देखने हेतु); डीटेल = हर नाप-लाइन अलग-अलग (संपादन योग्य)">🔗 एकसाथ</button></div>
    <div class="tbl-wrap" style="border:1px solid var(--line);border-radius:10px;max-height:42vh;overflow:auto"><table class="pb-meas">
    <thead><tr><th>नाप लाइन (MB)</th><th class="r">कुल मा.</th><th class="r">शेष मा.</th><th class="r">दर</th><th class="r">इस बिल में</th><th class="r">राशि</th></tr></thead>
    <tbody id="pbBody">${blocks}${combinedBlocks}</tbody></table></div>

    <div class="pb-steps">
    <div class="pb-card">
      <div class="pb-card-head"><span class="pb-ic">🧮</span><b>निर्धारित राशि व Above/Below</b><span class="hint">परियोजना सेटिंग से</span></div>
      <div class="pb-row"><span class="lbl"><span class="t">T1</span>निर्धारित राशि (Schedule Amount)</span><b class="amt" id="pbT1">₹0</b></div>
      <div class="pb-row"><span class="lbl"><span class="t">T2</span>Above/Below %</span><b class="amt" id="pbT2">0%</b></div>
      <div class="pb-row"><span class="lbl"><span class="t">T3</span>Above/Below राशि</span><b class="amt" id="pbT3">₹0</b></div>
      <div class="pb-row subtotal"><span class="lbl"><span class="t">T4</span>राशि (Schedule + Above/Below)</span><b class="amt" id="pbT4">₹0</b></div>
    </div>

    <div class="pb-card">
      <div class="pb-card-head"><span class="pb-ic">➖</span><b>कटौती (Deductions)</b>
        <button class="btn btn-ghost btn-sm" onclick="pbAdjAdd('deduction')">+ कटौती जोड़ें</button></div>
      <div id="pbDeductList"></div>
      <div class="pb-row"><span class="lbl"><span class="t">T5</span>कुल कटौती</span><b class="amt neg" id="pbT5">₹0</b></div>
      <div class="pb-row subtotal"><span class="lbl"><span class="t">T6</span>कटौती के बाद राशि</span><b class="amt" id="pbT6">₹0</b></div>
    </div>

    <div class="pb-card">
      <div class="pb-card-head"><span class="pb-ic">➕</span><b>Advance Amount</b>
        <button class="btn btn-ghost btn-sm" onclick="pbAdjAdd('advance')">+ Advance जोड़ें</button></div>
      <div class="pb-row" style="background:var(--blue-bg)"><span class="lbl">ठेकेदार को अब तक (पूर्व बिलों में) कुल Advance दिया गया</span><b class="amt">${pbSigned(priorAdvance)}</b></div>
      <div id="pbAdvanceList"></div>
      <div class="pb-row"><span class="lbl"><span class="t">T7</span>कुल Advance (इस बिल में)</span><b class="amt pos" id="pbT7">₹0</b></div>
      <div class="pb-row subtotal"><span class="lbl">इस बिल के बाद अब कुल Advance शेष</span><b class="amt" id="pbAdvanceRunning">₹0</b></div>
    </div>
    <div class="pb-total" style="margin:0"><span class="lbl">T8 · कुल भुगतान Amount</span><span class="amt" id="pbT8">₹0</span></div>

    <div class="pb-card">
      <div class="pb-card-head"><span class="pb-ic">⏸</span><b>Withheld — कितना भुगतान रोकना है</b></div>
      <div class="pb-row" style="background:var(--blue-bg)"><span class="lbl">ठेकेदार का अब तक (पूर्व बिलों में) कुल Withheld</span><b class="amt">${pbSigned(priorWithheld)}</b></div>
      <div class="pb-row" style="padding:10px 14px"><input class="inp num" id="pb_withheld" type="number" step="any" style="max-width:160px;margin-left:auto" value="${esc(p.WithheldAmt||'')}" oninput="pbRecalc()" placeholder="₹0"></div>
      <div class="pb-row"><span class="lbl"><span class="t">T9</span>Withheld राशि (इस बिल में)</span><b class="amt neg" id="pbT9">₹0</b></div>
      <div class="pb-row subtotal"><span class="lbl">इस बिल के बाद अब तक कुल Withheld</span><b class="amt" id="pbWithheldRunning">₹0</b></div>
      <div class="pb-row subtotal"><span class="lbl"><span class="t">T10</span>A (Withheld के बाद)</span><b class="amt" id="pbT10">₹0</b></div>
    </div>

    <div class="pb-card">
      <div class="pb-stat-row" style="background:var(--surface-2)">
        <input type="checkbox" id="pb_GstOn" ${statSrc.GstOn?'checked':''} onchange="pbRecalc()">
        <label for="pb_GstOn">🧾 GST जोड़ें (A पर %)</label>
        ${manualBlk('Gst',statSrc.GstManual,statSrc.GstManualAmt)}
        <input class="inp num pct-inp" id="pb_GstPct" type="number" step="any" style="${statSrc.GstManual?'display:none':''}" value="${esc(statSrc.GstPct||'')}" placeholder="%" oninput="pbRecalc()">
        <span class="amt" id="pb_GstAmt">₹0</span>
      </div>
      <div class="pb-row"><span class="lbl"><span class="t">T11</span>GST राशि</span><b class="amt pos" id="pbT11">₹0</b></div>
    </div>
    <div class="pb-total" style="margin:0"><span class="lbl">T12 · F (GST सहित Final)</span><span class="amt" id="pbT12">₹0</span></div>

    <div class="pb-card">
      <div class="pb-card-head"><span class="pb-ic">📋</span><b>सांविधिक कटौतियाँ (F में से, % A पर आधारित — या मैनुअल राशि)</b></div>
      ${statRow('LaborCess','T13','Labour Cess','👷',statSrc.LaborCessOn,statSrc.LaborCessPct,statSrc.LaborCessManual,statSrc.LaborCessManualAmt)}
      ${statRow('IncomeTax','T14','Income Tax','🧾',statSrc.IncomeTaxOn,statSrc.IncomeTaxPct,statSrc.IncomeTaxManual,statSrc.IncomeTaxManualAmt)}
      ${statRow('Retention','T15','Retention Money','🔒',statSrc.RetentionOn,statSrc.RetentionPct,statSrc.RetentionManual,statSrc.RetentionManualAmt)}
      ${statRow('Cgst','T16','CGST','🏛',statSrc.CgstOn,statSrc.CgstPct,statSrc.CgstManual,statSrc.CgstManualAmt)}
      ${statRow('Sgst','T17','SGST','🏛',statSrc.SgstOn,statSrc.SgstPct,statSrc.SgstManual,statSrc.SgstManualAmt)}
    </div>

    <div class="pb-total" style="margin-top:2px"><span class="lbl">T18 · Nett Paid Amount (चेक राशि)</span><span class="amt" id="pbT18">₹0</span></div>
    </div>`;

  openModal(editId?'भुगतान संपादित करें':'नया भुगतान / RA Bill', refreshBar+header+lockBanner+table,
    `<button class="btn btn-ghost" onclick="closeModal()">रद्द</button>
     <button class="btn btn-primary" onclick="savePayBuilder()"><span class="ic">✓</span> भुगतान सहेजें</button>`, true);
  pbRenderAdjList('deduction');
  pbRenderAdjList('advance');
  pbRecalc();
}
/* बिल प्रकार 'अंतिम' चुनने पर ही वास्तविक समाप्ति तिथि व सड़क-सिंक checkbox दिखाएँ */
function pbToggleFinalBlk(){
  const isFinal = val('pb_type')==='अंतिम';
  const blk = document.getElementById('pb_finalBlk');
  if (blk) blk.style.display = isFinal ? '' : 'none';
  const chk = document.getElementById('pb_syncWrap');
  if (chk) chk.style.display = isFinal ? 'flex' : 'none';
}
/* GST/Labour Cess/Income Tax/Retention/CGST/SGST — मैनुअल राशि चेकबॉक्स टॉगल (% इनपुट ↔ राशि इनपुट) */
function pbToggleManual(key){
  const manual = document.getElementById('pb_'+key+'Manual').checked;
  const pctEl = document.getElementById('pb_'+key+'Pct');
  const amtEl = document.getElementById('pb_'+key+'ManualAmt');
  if (pctEl) pctEl.style.display = manual ? 'none' : '';
  if (amtEl) amtEl.style.display = manual ? '' : 'none';
  pbRecalc();
}
/* सेटिंग टैब में बाद में बदली गई GST/CGST/SGST/Labour Cess/Income Tax/Retention दरें — खुले फ़ॉर्म में लाएँ (मात्रा/कटौती/advance को छेड़े बिना) */
function pbRefreshSettings(){
  loader(true);
  api('getAllData').then(function(d){
    state.data.project = (d && d.project) || state.data.project || {};
    loader(false);
    const sd = settingsDefaults();
    ['Gst','Cgst','Sgst','LaborCess','IncomeTax','Retention'].forEach(function(k){
      const onEl=document.getElementById('pb_'+k+'On'), pctEl=document.getElementById('pb_'+k+'Pct');
      if(onEl) onEl.checked = sd[k+'On'];
      if(pctEl) pctEl.value = sd[k+'Pct'];
    });
    pbRecalc();
    toast('सेटिंग की नई दरें इस फ़ॉर्म में लागू हो गईं');
  }).catch(function(e){ loader(false); toast('त्रुटि: '+e, true); });
}
function pbRows(){ return Array.from(document.querySelectorAll('#pbBody tr[data-meas]')); }
function pbRenderAdjList(kind){
  const arr = kind==='deduction' ? PB.deductions : PB.advances;
  const el = document.getElementById(kind==='deduction' ? 'pbDeductList' : 'pbAdvanceList');
  if(!el) return;
  el.innerHTML = arr.map((d,i)=>`
    <div class="pb-adj-row">
      <input class="inp" style="flex:2" placeholder="नोट / कारण" value="${esc(d.note||'')}" oninput="pbAdjEdit('${kind}',${i},'note',this.value)">
      <input class="inp num" style="flex:1;max-width:120px" type="number" step="any" placeholder="राशि" value="${d.amount||''}" oninput="pbAdjEdit('${kind}',${i},'amount',this.value)">
      <button class="icon-btn danger" title="हटाएँ" onclick="pbAdjRemove('${kind}',${i})">✕</button>
    </div>`).join('') || `<div class="pb-adj-empty">कोई एंट्री नहीं</div>`;
}
function pbAdjAdd(kind){
  (kind==='deduction'?PB.deductions:PB.advances).push({note:'',amount:''});
  pbRenderAdjList(kind);
}
function pbAdjRemove(kind,i){
  (kind==='deduction'?PB.deductions:PB.advances).splice(i,1);
  pbRenderAdjList(kind);
  pbRecalc();
}
function pbAdjEdit(kind,i,field,v){
  const arr = kind==='deduction'?PB.deductions:PB.advances;
  if(!arr[i]) return;
  arr[i][field] = field==='amount' ? toNum(v) : v;
  pbRecalc();
}
function pbRecalc(){
  let total=0; // T1
  const itemTotals={}; // ItemID → {qty, amt} — "इस बिल में अब तक" लाइव बैज (डीटेल हेडर) व "एकसाथ" पंक्ति दोनों के लिए
  pbRows().forEach(function(tr){
    const inp=tr.querySelector('.pb-input');
    let q=toNum(inp.value);
    const max=toNum(tr.dataset.max);
    const rate=toNum(tr.dataset.rate);
    const itemId=tr.dataset.item;
    const isOver = max>=0 ? q>max+0.0005 : q<max-0.0005;
    if(isOver){ inp.style.borderColor='var(--red-2)'; inp.title='शेष ('+qf(max)+') से '+(max>=0?'अधिक':'कम')+' नहीं'; }
    else { inp.style.borderColor=''; inp.title=''; }
    const amt=round(q*rate,2);
    tr.querySelector('[data-amt]').textContent=inr(amt);
    total+=amt;
    if(!itemTotals[itemId]) itemTotals[itemId]={qty:0,amt:0};
    itemTotals[itemId].qty+=q; itemTotals[itemId].amt+=amt;
    const fillBtn=tr.querySelector('.pb-fill-toggle');
    if(fillBtn) fillBtn.classList.toggle('full', Math.abs(q-max)<0.0005 && Math.abs(max)>0.0005);
  });
  Object.keys(itemTotals).forEach(function(itemId){
    const it=itemTotals[itemId];
    const live=document.querySelector('[data-itemlive="'+itemId+'"]');
    if(live){ live.querySelector('[data-qty]').textContent=qf(round(it.qty,3)); live.querySelector('[data-amt]').textContent=inr(round(it.amt,2)); }
    const comb=document.querySelector('#pbBody tr.pb-combined-row[data-itemtotal="'+itemId+'"]');
    if(comb){ comb.querySelector('[data-qty]').innerHTML='<b>'+qf(round(it.qty,3))+'</b>'; comb.querySelector('[data-amt]').textContent=inr(round(it.amt,2)); }
  });
  const t1=round(total,2);
  const t2=toNum((state.data.project||{}).abovePct)||0;
  const t3=round(t1*t2/100,2);
  const t4=round(t1+t3,2);

  const t5=round((PB.deductions||[]).reduce((s,d)=>s+(toNum(d.amount)||0),0),2);
  const t6=round(t4-t5,2);

  const t7=round((PB.advances||[]).reduce((s,d)=>s+(toNum(d.amount)||0),0),2);
  const t8=round(t6+t7,2);

  const t9=round(toNum(val('pb_withheld')),2);
  const t10=round(t8-t9,2); // A

  const gstOn = document.getElementById('pb_GstOn').checked;
  const gstManual = document.getElementById('pb_GstManual') ? document.getElementById('pb_GstManual').checked : false;
  const gstPct = toNum(val('pb_GstPct'));
  const t11 = gstOn ? (gstManual ? round(toNum(val('pb_GstManualAmt')),2) : round(t10*gstPct/100,2)) : 0;
  const t12 = round(t10+t11,2); // F

  const statCalc=(key)=>{
    const on=document.getElementById('pb_'+key+'On').checked;
    const manualEl=document.getElementById('pb_'+key+'Manual');
    const manual=manualEl?manualEl.checked:false;
    const pct=toNum(val('pb_'+key+'Pct'));
    const amt = on ? (manual ? round(toNum(val('pb_'+key+'ManualAmt')),2) : round(t10*pct/100,2)) : 0;
    document.getElementById('pb_'+key+'Amt').textContent = inr(amt);
    return amt;
  };
  const t13=statCalc('LaborCess'), t14=statCalc('IncomeTax'), t15=statCalc('Retention'), t16=statCalc('Cgst'), t17=statCalc('Sgst');
  const t18=round(t12-(t13+t14+t15+t16+t17),2);

  document.getElementById('pbT1').textContent=inr(t1);
  document.getElementById('pbT2').textContent=(t2===0?'0%':(t2>0?'+':'')+t2+'% '+(t2<0?'(Below)':'(Above)'));
  document.getElementById('pbT3').textContent=(t3<0?'− ':'+ ')+inr(Math.abs(t3));
  document.getElementById('pbT4').textContent=inr(t4);
  document.getElementById('pbT5').textContent=inr(t5);
  document.getElementById('pbT6').textContent=inr(t6);
  document.getElementById('pbT7').textContent=inr(t7);
  document.getElementById('pbT8').textContent=inr(t8);
  document.getElementById('pbT9').textContent=inr(t9);
  document.getElementById('pbT10').textContent=inr(t10);
  document.getElementById('pbAdvanceRunning').textContent=pbSigned((PB.priorAdvance||0)+t7);
  document.getElementById('pbWithheldRunning').textContent=pbSigned((PB.priorWithheld||0)+t9);
  document.getElementById('pb_GstAmt').textContent=inr(t11);
  document.getElementById('pbT11').textContent=inr(t11);
  document.getElementById('pbT12').textContent=inr(t12);
  document.getElementById('pbT18').textContent=inr(t18);
  return {t1,t2,t3,t4,t5,t6,t7,t8,t9,t10,t11,t12,t13,t14,t15,t16,t17,t18};
}
function pbFillAll(){ pbRows().forEach(tr=>{ tr.querySelector('.pb-input').value=round(toNum(tr.dataset.max),3); }); pbRecalc(); }
function pbClearAll(){ pbRows().forEach(tr=>{ tr.querySelector('.pb-input').value=''; }); pbRecalc(); }
/* किसी एक नाप-लाइन के आगे का छोटा ✓ टॉगल — पूरी शेष मात्रा भर दे; दुबारा क्लिक करने पर खाली कर दे।
   मैनुअल आधी-भरी मात्रा पर क्लिक करने का मतलब भी "पूरा भरें" ही है (खाली सिर्फ़ तभी जब पहले से पूरी भरी हो) */
function pbToggleLineFill(btn){
  const tr=btn.closest('tr'); if(!tr) return;
  const inp=tr.querySelector('.pb-input');
  const max=toNum(tr.dataset.max);
  const cur=toNum(inp.value);
  const isFull=Math.abs(cur-max)<0.0005;
  inp.value = isFull ? '' : (max?round(max,3):'');
  pbRecalc();
}
/* आइटम-हेडर का "🚫 बाहर रखें" चेकबॉक्स — चेक करने पर उस आइटम की सभी नाप-लाइनों की मात्रा एक साथ खाली व डिसेबल कर देता है
   (इस बिल से वह आइटम पूरी तरह हट जाता है); अनचेक करने पर लाइनें फिर से संपादन योग्य हो जाती हैं।
   हर लाइन का ✓ टॉगल भी मात्रा 0 होने से अपने-आप "full" नहीं दिखता — pbRecalc() में वही जाँच पहले से होती है। */
function pbToggleItemExclude(cb, itemId){
  const excluded=cb.checked;
  document.querySelectorAll('#pbBody tr.pb-line-row[data-item="'+itemId+'"]').forEach(function(tr){
    const inp=tr.querySelector('.pb-input');
    const fillBtn=tr.querySelector('.pb-fill-toggle');
    if(excluded) inp.value='';
    inp.disabled=excluded;
    if(fillBtn) fillBtn.disabled=excluded;
  });
  pbRecalc();
}
/* डीटेल ↔ एकसाथ — सिर्फ़ दिखाना/छुपाना बदलता है; "एकसाथ" सिर्फ़ देखने हेतु है (पढ़ने योग्य — संपादन सिर्फ़ डीटेल की नाप-लाइन से ही होता है) */
function pbSetViewMode(mode){
  PB.viewMode=mode;
  const tbody=document.getElementById('pbBody'); if(!tbody) return;
  const lineRows=tbody.querySelectorAll('tr.pb-line-row, tr.grp-row');
  const combRows=tbody.querySelectorAll('tr.pb-combined-row');
  if(mode==='combined'){
    lineRows.forEach(tr=>tr.style.display='none');
    combRows.forEach(tr=>tr.style.display='');
  } else {
    combRows.forEach(tr=>tr.style.display='none');
    lineRows.forEach(tr=>tr.style.display='');
  }
  pbRecalc();
  const btn=document.getElementById('pb_modeBtn');
  if(btn) btn.textContent = mode==='combined' ? '📝 डीटेल' : '🔗 एकसाथ';
}
function pbToggleViewMode(){ pbSetViewMode(PB.viewMode==='combined'?'detail':'combined'); }
function savePayBuilder(){
  if(PB.editId){
    const existingP=D().payments.find(x=>String(x.PayID)===String(PB.editId));
    if(existingP && payBoolJs(existingP.Paid)){ toast('यह बिल भुगतान (चेक) हो चुका है — अब इसमें बदलाव नहीं किया जा सकता',true); return; }
  }
  const details=[]; let over=false;
  pbRows().forEach(function(tr){
    // qtyLocked बिल में — UI डिसेबल रहता है; यहाँ भी मूल (existing) मात्रा ही प्रयोग करें, इनपुट से नहीं
    const q = PB.qtyLocked ? toNum((PB.existingQty||{})[tr.dataset.meas]) : toNum(tr.querySelector('.pb-input').value);
    const max=toNum(tr.dataset.max);
    const isOver = PB.qtyLocked ? false : (max>=0 ? q>max+0.0005 : q<max-0.0005);
    if(isOver) over=true;
    if(Math.abs(q)>0.0005){
      const rate=toNum(tr.dataset.rate);
      details.push({ MeasID:tr.dataset.meas, ItemID:tr.dataset.item, Qty:round(q,3), Rate:rate, Amount:round(q*rate,2) });
    }
  });
  if(over){ toast('कुछ लाइनों में मात्रा शेष से अधिक है — सुधारें',true); return; }
  const calc=pbRecalc();
  if(Math.abs(calc.t18)<0.005){ toast('भुगतान के लिए कोई Amount नहीं है',true); return; }
  const billNo=val('pb_no');
  // नए भुगतान में यदि BillNo पहले से मौजूद हो → merge करें, duplicate न बनाएं
  if(!PB.editId && billNo){
    const existPay=D().payments.find(x=>String(x.BillNo||'').trim()===String(billNo).trim());
    if(existPay && payBoolJs(existPay.Paid)){
      toast('बिल '+billNo+' भुगतान (चेक) हो चुका है — अब इसमें मर्ज नहीं किया जा सकता, कोई अन्य बिल संख्या चुनें',true);
      return;
    }
    if(existPay){
      const existDets=detailsOf('PayID',existPay.PayID);
      const newByMeas={}; details.forEach(d=>{ newByMeas[d.MeasID]=d; });
      const merged=[];
      existDets.forEach(function(d){
        const nd=newByMeas[d.MeasID];
        if(nd){ const q=round(toNum(d.Qty)+nd.Qty,3); merged.push({MeasID:d.MeasID,ItemID:d.ItemID,Qty:q,Rate:nd.Rate,Amount:round(q*nd.Rate,2)}); delete newByMeas[d.MeasID]; }
        else merged.push({MeasID:d.MeasID,ItemID:d.ItemID,Qty:toNum(d.Qty),Rate:toNum(d.Rate),Amount:toNum(d.Amount)});
      });
      Object.keys(newByMeas).forEach(k=>merged.push(newByMeas[k]));
      const payment=Object.assign({}, existPay, {BillNo:billNo, BillType:val('pb_type'), PDate:val('pb_date'), MBNo:val('pb_mb'), MBPages:val('pb_pg'), Remarks:val('pb_rem')}, pbFinalFields(), pbManualFields());
      loader(true);
      api('savePayment',{payment:payment,details:merged}).then(()=>pbSyncFinalIfNeeded(payment)).then(()=>{ closeModal(); refresh(); toast('बिल '+billNo+' में मर्ज हुआ — duplicate नहीं बनाया'); }).catch(e=>{loader(false);toast('त्रुटि: '+e,true);});
      return;
    }
  }
  const payment={ PayID:PB.editId||'', BillNo:billNo, BillType:val('pb_type'),
    PDate:val('pb_date'), MBNo:val('pb_mb'), MBPages:val('pb_pg'), Remarks:val('pb_rem'),
    ...pbFinalFields(), ...pbManualFields(),
    WithheldAmt:toNum(val('pb_withheld')),
    GstOn:document.getElementById('pb_GstOn').checked, GstPct:toNum(val('pb_GstPct')),
    LaborCessOn:document.getElementById('pb_LaborCessOn').checked, LaborCessPct:toNum(val('pb_LaborCessPct')),
    IncomeTaxOn:document.getElementById('pb_IncomeTaxOn').checked, IncomeTaxPct:toNum(val('pb_IncomeTaxPct')),
    RetentionOn:document.getElementById('pb_RetentionOn').checked, RetentionPct:toNum(val('pb_RetentionPct')),
    CgstOn:document.getElementById('pb_CgstOn').checked, CgstPct:toNum(val('pb_CgstPct')),
    SgstOn:document.getElementById('pb_SgstOn').checked, SgstPct:toNum(val('pb_SgstPct')) };
  loader(true);
  api('savePayment',{payment:payment, details:details, deductions:PB.deductions, advances:PB.advances})
    .then(()=>pbSyncFinalIfNeeded(payment))
    .then(()=>{ closeModal(); refresh(); toast('भुगतान सहेजा गया'); })
    .catch(e=>{loader(false);toast('त्रुटि: '+e,true);});
}
/* GST/Labour Cess/Income Tax/Retention/CGST/SGST — मैनुअल checkbox व राशि के मान निकालें */
function pbManualFields(){
  const keys=['Gst','LaborCess','IncomeTax','Retention','Cgst','Sgst'], o={};
  keys.forEach(function(k){
    const cb=document.getElementById('pb_'+k+'Manual');
    o[k+'Manual']=cb?cb.checked:false;
    o[k+'ManualAmt']=toNum(val('pb_'+k+'ManualAmt'));
  });

}
/* अंतिम बिल में 'बिल प्रकार' पर निर्भर — वास्तविक समाप्ति तिथि व सड़क-सिंक checkbox मान निकालें */
function pbFinalFields(){
  const isFinal = val('pb_type')==='अंतिम';
  const cb = document.getElementById('pb_syncRoadWork');
  return { ActualEndDate: isFinal ? val('pb_actualEnd') : '', SyncRoadWork: isFinal && cb ? cb.checked : false };
}
/* अंतिम बिल में वास्तविक समाप्ति तिथि भरी हो तो मुख्य परियोजना (3_Projects) में sync करें — परियोजना व
   सड़क-लिंक का status Running से हटकर Completed हमेशा हो जाएगा; checkbox चेक हो तभी सड़क सूची की
   आखिरी कार्य तिथि (व उससे बनने वाला अनुरक्षण अवधि नोट) भी अपडेट होगी */
function pbSyncFinalIfNeeded(payment){
  if (payment.BillType!=='अंतिम' || !payment.ActualEndDate) return null;
  const nm = (state.data.project&&state.data.project.name)||(state.projectState&&state.projectState.active&&state.projectState.active.name)||'';
  if (!nm) return null;
  return api('syncToMain', { projectName: nm, actualEndDate: payment.ActualEndDate, syncRoadWork: !!payment.SyncRoadWork }).catch(()=>null);
}

/* किसी भुगतान का पूरा T1-T18 ब्रेकडाउन (कटौती/advance लाइन-नोट सहित) — मोडल व इनलाइन दोनों में प्रयुक्त */

function viewPaymentDetail(id){
  const p=D().payments.find(x=>String(x.PayID)===String(id));
  const det=detailsOf('PayID',id);
  // आइटम अनुसार ग्रुप — एक आइटम कि कुल मात्रा/राशि एक ही लाइन में, मूल नाप-वार लाइनें "Detail" के पीछे
  const groups={}, order=[];
  det.forEach(function(d){
    const k=String(d.ItemID);

    groups[k].qty+=toNum(d.Qty); groups[k].amount+=toNum(d.Amount); groups[k].lines.push(d);
  });
  let rows=order.map(function(k,idx){
    const g=groups[k], it=itemById(g.ItemID)||{};

    const detId='pd-det-'+idx;

      <td>${esc(it.Description||'')} <button class="btn btn-ghost btn-sm" style="margin-left:8px" onclick="togglePayItemDetail('${detId}',this)">Detail</button></td>
      <td class="r num">${qf(g.qty)}</td><td class="r num">${inr(rate)}</td><td class="r num">${inr(g.amount)}</td></tr></tbody>
      <tbody id="${detId}" style="display:none">${lineRows}</tbody>`;
  }).join('') || `<tbody><tr><td colspan="5" class="muted" style="text-align:center">कोई लाइन नहीं</td></tr></tbody>`;
  const body=`<dl class="kv">
    <dt>बिल संख्या</dt><dd style="font-family:var(--ui)">${esc(p.BillNo||'—')} (${esc(p.BillType||'चालू')})</dd>
    <dt>तारीख</dt><dd>${dmy(p.PDate)}</dd>
    <dt>MB / पृष्ठ</dt><dd>${esc(p.MBNo||'—')}${p.MBPages?(' / '+esc(p.MBPages)):''}</dd>
    ${p.Remarks?`<dt>टिप्पणी</dt><dd style="font-family:var(--ui)">${esc(p.Remarks)}</dd>`:''}</dl>
    <div class="tbl-wrap" style="border:1px solid var(--line);border-radius:10px"><table>
    <thead><tr><th>क्र.</th><th>आइटम</th><th class="r">मात्रा</th><th class="r">दर</th><th class="r">राशि</th></tr></thead>
    ${rows}</table></div>
    ${payBreakdownHtml(p)}`;
  openModal('भुगतान विवरण', body,
    `<button class="btn btn-ghost" onclick="closeModal()">बंद करें</button>
     ${payBoolJs(p.Paid)?'':`<button class="btn btn-ink" onclick='closeModal();openPayBuilder(${JSON.stringify(id)})'>✎ संपादित करें</button>`}`, true);
}
/* किसी बिल की एक भुगतान-लाइन (एक नाप) हटाएँ — बाकी लाइनें/कुल पुनः बनते हैं; निर्धारित/शेष auto-update */
function delPayDetail(payId, measId){
  const p=D().payments.find(x=>String(x.PayID)===String(payId)); if(!p) return;
  if(payBoolJs(p.Paid)){ toast('यह बिल भुगतान (चेक) हो चुका है — अब इसमें बदलाव नहीं किया जा सकता',true); return; }
  const rest=detailsOf('PayID',payId).filter(d=>String(d.MeasID)!==String(measId));
  confirmModal('भुगतान-लाइन हटाएँ?', `बिल "${esc(p.BillNo||'')}" से इस नाप का भुगतान हटाया जाएगा। निर्धारित/भुगतान/शेष पुनः अपडेट होंगे।`, ()=>{
    loader(true);
    const op = rest.length
      ? api('savePayment', { payment:p, details: rest.map(d=>({MeasID:d.MeasID, ItemID:d.ItemID, Qty:toNum(d.Qty), Rate:toNum(d.Rate), Amount:toNum(d.Amount)})) })
      : api('deletePayment', payId);
    op.then(()=>{ refresh(); toast('भुगतान-लाइन हटाई गई'); }).catch(e=>{loader(false);toast('त्रुटि: '+e,true);});
  });
}
/* भुगतान/बिल हटाएँ — केवल सबसे आखिरी बिल (BillNo अनुसार) हटाया जा सकता है, चाहे वह Paid (चेक जारी) हो
   या न हो — 3 चेतावनियों के बाद हटता है। बीच के किसी बिल को हटाने का प्रयास करने पर पहले आखिरी बिल
   हटाने को कहा जाता है, क्योंकि बीच का बिल हटाने से नाप/राशि का क्रम बिगड़ जाएगा। */
function delPay(id){
  const p=D().payments.find(x=>String(x.PayID)===String(id));
  if(!p) return;
  const curNo = parseInt(String(p.BillNo||'').replace(/[^\d]/g,''),10);
  const maxNo = D().payments.reduce((mx,x)=>{ const n=parseInt(String(x.BillNo||'').replace(/[^\d]/g,''),10); return (!isNaN(n)&&n>mx)?n:mx; }, 0);
  if (isNaN(curNo) || curNo!==maxNo) {
    toast('यह आखिरी बिल नहीं है — पहले सबसे आखिरी भुगतान/बिल को डिलीट करें, उसके बाद ही यह बिल हटाया जा सकेगा', true);
    return;
  }
  const paidNote = payBoolJs(p.Paid) ? ' इस बिल का भुगतान (चेक) पहले ही हो चुका है — फिर भी यह सबसे आखिरी बिल होने के कारण हटाया जा सकता है।' : '';
  confirmModal('⚠ भुगतान हटाएँ? (चेतावनी 1/3)',
    `बिल "${esc(p.BillNo||'')}" (${inr(p.TotalAmount)}) हटाने जा रहे हैं। इससे संबंधित नापों की मात्रा पुनः शेष में जुड़ जाएगी।${paidNote}`, ()=>{
    confirmModal('⚠ पुनः पुष्टि (चेतावनी 2/3)',
      `बिल "${esc(p.BillNo||'')}" का सारा भुगतान-डेटा स्थायी रूप से चला जाएगा और इसे वापस नहीं लाया जा सकता। फिर भी हटाएँ?`, ()=>{
      confirmModal('⚠ अंतिम चेतावनी (3/3)',
        'यह आख़िरी पुष्टि है। हाँ करते ही यह बिल स्थायी रूप से हट जाएगा। निश्चित रूप से हटाएँ?', ()=>{
        loader(true); api('deletePayment',id).then(()=>{state.payBill='';refresh();toast('भुगतान हटाया गया');}).catch(e=>{loader(false);toast('त्रुटि: '+e,true);});
      }, 'हाँ, स्थायी रूप से हटाएँ');
    }, 'हाँ, जारी रखें');
  }, 'आगे बढ़ें');
}
/* चेक जारी होने पर इस बिल को फ़्रीज़ करें — PaidDate स्वतः आज की तारीख बनेगी; बाद में सेटिंग बदलने पर भी इस बिल का GST/Labour Cess आदि नहीं बदलेगा */
function markBillPaid(payId){
  const p=D().payments.find(x=>String(x.PayID)===String(payId)); if(!p) return;
  confirmModal('✅ Payment — चेक जारी हुआ चिह्नित करें?',
    `बिल "${esc(p.BillNo||'')}" (चेक राशि ${inr(p.NettPaid!=null && p.NettPaid!==''?p.NettPaid:p.TotalAmount)}) के लिए आज की तारीख दर्ज होगी और यह बिल फ़्रीज़ हो जाएगा — इसके बाद इसकी मात्रा, कटौती, GST/सांविधिक % आदि में कोई बदलाव नहीं किया जा सकेगा।`,
    ()=>{
      loader(true);
      api('markPaid', payId).then(()=>{ refresh(); toast('बिल भुगतान चिह्नित हुआ — अब यह फ़्रीज़ है'); })
        .catch(e=>{ loader(false); toast('त्रुटि: '+e, true); });
    }, 'हाँ, भुगतान हुआ');
}
function mergeIntoBill(keepId){
  const keepPay=D().payments.find(x=>String(x.PayID)===String(keepId));
  if(!keepPay) return;
  if(payBoolJs(keepPay.Paid)){ toast('यह बिल भुगतान (चेक) हो चुका है — अब इसमें मर्ज नहीं किया जा सकता',true); return; }
  const others=D().payments.filter(x=>String(x.BillNo||'')===String(keepPay.BillNo||'')&&String(x.PayID)!==String(keepId));
  if(!others.length){ toast('कोई डुप्लीकेट बिल नहीं',true); return; }
  confirmModal('🔀 डुप्लीकेट बिल मर्ज करें?',
    `बिल "${esc(keepPay.BillNo||'')}" के ${others.length+1} रिकॉर्ड एक में जुड़ेंगे। ${others.length} डुप्लीकेट हट जाएंगे और उनकी सभी मात्राएँ इसी बिल में आ जाएंगी।`,
    function(){
      const allDets={};
      detailsOf('PayID',keepId).forEach(function(d){ allDets[d.MeasID]={MeasID:d.MeasID,ItemID:d.ItemID,Qty:toNum(d.Qty),Rate:toNum(d.Rate),Amount:toNum(d.Amount)}; });
      others.forEach(function(op){
        detailsOf('PayID',op.PayID).forEach(function(d){
          if(allDets[d.MeasID]){ const q=round(allDets[d.MeasID].Qty+toNum(d.Qty),3); allDets[d.MeasID].Qty=q; allDets[d.MeasID].Amount=round(q*allDets[d.MeasID].Rate,2); }
          else allDets[d.MeasID]={MeasID:d.MeasID,ItemID:d.ItemID,Qty:toNum(d.Qty),Rate:toNum(d.Rate),Amount:toNum(d.Amount)};
        });
      });
      const merged=Object.keys(allDets).map(k=>allDets[k]).filter(d=>Math.abs(d.Qty)>0.0005);
      loader(true);
      api('savePayment',{payment:keepPay,details:merged})
        .then(function(){ return others.reduce(function(pr,op){ return pr.then(function(){ return api('deletePayment',op.PayID); }); }, Promise.resolve()); })
        .then(function(){ refresh(); toast('बिल मर्ज हुए — '+others.length+' डुप्लीकेट हटाए'); })
        .catch(function(e){ loader(false); toast('त्रुटि: '+e,true); });
    }, 'हाँ, मर्ज करें');
}

function autoUpdatePayment(payId){
  const p=D().payments.find(x=>String(x.PayID)===String(payId));
  if(!p){ toast('भुगतान नहीं मिला',true); return; }
  if(payBoolJs(p.Paid)){ toast('यह बिल भुगतान (चेक) हो चुका है — अब इसमें बदलाव नहीं किया जा सकता',true); return; }
  const existing={};
  detailsOf('PayID',payId).forEach(function(d){ existing[d.MeasID]={qty:toNum(d.Qty),rate:toNum(d.Rate),itemId:d.ItemID}; });
  if(!Object.keys(existing).length){ toast('इस बिल में कोई नाप-लाइन नहीं है',true); return; }

  const newDetails=[]; let newCount=0;
  items().forEach(function(it){
    actualMeasOfItem(it.ItemID).forEach(function(m){
      if(!existing[m.MeasID]) return; // इस बिल में नहीं है → नहीं जोड़ें
      const curQty=existing[m.MeasID].qty;
      // सभी payments मिलाकर genuinely शेष (किसी भी बिल में नहीं गई qty)
      const trulyRem=measRemain(m,null);
      // केवल positive remaining जोड़ें; duplicate-bill से negative हो तो curQty बनाए रखें
      const qToSave=trulyRem>0.0005?round(curQty+trulyRem,3):curQty;
      if(trulyRem>0.0005) newCount++;
      const rate=itemRate(it);
      newDetails.push({MeasID:m.MeasID,ItemID:it.ItemID,Qty:qToSave,Rate:rate,Amount:round(qToSave*rate,2)});
    });
  });

  if(!newCount){ toast('कोई नई मात्रा उपलब्ध नहीं — इस बिल की सभी नापों का पूर्ण भुगतान हो चुका है'); return; }
  const newTotal=round(newDetails.reduce(function(s,d){return s+d.Amount;},0),2);
  confirmModal('🔄 भुगतान अपडेट करें?',
    `बिल <b>${esc(p.BillNo||'')}</b> में <b>${newCount}</b> नाप की शेष मात्रा अपडेट होगी।<br>अपडेटेड कुल राशि: <b>${inr(newTotal)}</b><br><small style="color:var(--muted)">पुराना कुल: ${inr(p.TotalAmount||0)}</small>`,
    function(){
      loader(true);
      api('savePayment',{payment:p,details:newDetails})
        .then(function(){ refresh(); toast('भुगतान अपडेट हुआ — '+newCount+' नापों की मात्रा बढ़ी'); })
        .catch(function(e){ loader(false); toast('त्रुटि: '+e,true); });
    }, 'हाँ, अपडेट करें');
}

/* ---- confirm + sample ---- */
function confirmModal(title,msg,onYes,yesLabel){
  openModal(title, `<p style="color:var(--muted);line-height:1.6">${msg}</p>`,
    `<button class="btn btn-ghost" onclick="closeModal()">रद्द</button>
     <button class="btn btn-primary" style="background:var(--red-2)" id="cf_yes">${yesLabel||'हाँ, हटाएँ'}</button>`);
  document.getElementById('cf_yes').onclick=function(){ closeModal(); onYes(); };
}
function loadSampleProject(){
  confirmModal('नमूना परियोजना बनाएँ?','फ़ोल्डर में "नमूना परियोजना" नाम से एक नई spreadsheet बनेगी और लोड हो जाएगी (आपकी मौजूदा परियोजना अछूती रहेगी)।',()=>{
    loader(true); api('createSampleProject').then(()=>{ switchTab('dashboard'); refresh(); toast('नमूना परियोजना बनी व लोड हुई'); }).catch(e=>{loader(false);toast('त्रुटि: '+e,true);});
  });
}
